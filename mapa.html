<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Mapa de Risco de Incêndio</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{
  font-family: Arial;
  margin:0;
  padding:0;
}

#topbar{
  padding:10px;
  background:#333;
  color:white;
  font-weight:bold;
  text-align:center;
  font-size:20px;
}

#controls{
  padding:10px;
  background:#f2f2f2;
  border-bottom:1px solid #ccc;
  text-align:center;
}

#map{
  height:90vh;
  width:100%;
}

.legenda{
  background:white;
  padding:10px;
  line-height:18px;
  color:#333;
  box-shadow:0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div id="topbar">Mapa de Risco de Incêndio em Portugal</div>

<div id="controls">
Selecionar dia:
<select id="dia">
<option value="0">Hoje</option>
<option value="1">Amanhã</option>
</select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

const map = L.map('map').setView([39.5,-8],7);

// Tile escuro
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

let camada;

// cores por risco
function corRisco(r){
  return {
    1:"#00cc00",
    2:"#ffff00",
    3:"#ff9900",
    4:"#ff3300",
    5:"#990000"
  }[r] || "#999";
}

// nome do risco
function nomeRisco(r){
  return {
    1:"Reduzido",
    2:"Moderado",
    3:"Elevado",
    4:"Muito Elevado",
    5:"Máximo"
  }[r];
}

async function carregar(dia){
  const url = "https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d"+dia+".json";
  const resposta = await fetch(url);
  const dados = await resposta.json();

  if(camada) map.removeLayer(camada);
  camada = L.layerGroup();

  Object.values(dados.local).forEach(c=>{
    const risco = c.data.rcm;
    const marcador = L.circleMarker([c.latitude,c.longitude],{
      radius:7,
      color:corRisco(risco),
      fillColor:corRisco(risco),
      fillOpacity:0.85,
      weight:1
    });
    marcador.bindPopup("<b>Concelho:</b> "+c.local+"<br><b>Risco:</b> "+nomeRisco(risco));
    marcador.addTo(camada);
  });

  camada.addTo(map);
}

// carregar hoje
carregar(0);

// mudar dia
document.getElementById("dia").addEventListener("change", e=>{
  carregar(e.target.value);
});

// legenda
const legenda = L.control({position:'bottomright'});
legenda.onAdd = function(){
  const div = L.DomUtil.create('div','legenda');
  div.innerHTML =
    "<b>Risco de Incêndio</b><br>"+
    "<i style='background:#00cc00;width:12px;height:12px;display:inline-block'></i> Reduzido<br>"+
    "<i style='background:#ffff00;width:12px;height:12px;display:inline-block'></i> Moderado<br>"+
    "<i style='background:#ff9900;width:12px;height:12px;display:inline-block'></i> Elevado<br>"+
    "<i style='background:#ff3300;width:12px;height:12px;display:inline-block'></i> Muito Elevado<br>"+
    "<i style='background:#990000;width:12px;height:12px;display:inline-block'></i> Máximo";
  return div;
};
legenda.addTo(map);

</script>
</body>
</html>
