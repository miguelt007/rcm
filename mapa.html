<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco Rural (Final)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4400; z-index: 2000; }
        #titulo-principal { font-size: 20px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; top: 100px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: #fff; border: 1px solid #555; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; min-width: 220px; color: #222; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .tab-meteo td { border: 1px solid #eee; padding: 7px; text-align: left; }
        .temp-alerta { color: #d32f2f; font-weight: bold; }
        .legend { background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 5px; font-weight: bold; font-size: 11px; }
        .legend i { width: 15px; height: 15px; float: left; margin-right: 8px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="topbar"><h1 id="titulo-principal">Risco de Incêndio Rural - IPMA</h1></div>
    <div class="controles">
        <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
        <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
    </div>
    <div id="mapIPMA"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('mapIPMA').setView([39.5, -8.3], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const coresRisco = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
        const nomesRisco = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

        let camada;
        let cacheGeoJSON = null;

        // Função para tentar encontrar o valor de uma chave ignorando maiúsculas/minúsculas
        function obterValor(obj, chavesPossiveis) {
            for (let c of chavesPossiveis) {
                if (obj[c] !== undefined && obj[c] !== null) return obj[c];
            }
            return "--";
        }

        async function mudarDia(dia, btn) {
            if(btn) {
                document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            if (camada) map.removeLayer(camada);

            const proxy = "https://corsproxy.io/?";
            const urlIPMA = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${new Date().getTime()}`;

            try {
                if (!cacheGeoJSON) {
                    cacheGeoJSON = await fetch("concelhos-simples.geojson").then(r => r.json());
                }

                const resp = await fetch(proxy + encodeURIComponent(urlIPMA));
                const resR = await resp.json();
                
                const dadosLimpos = {};
                const fonte = resR.local;
                
                if (Array.isArray(fonte)) {
                    fonte.forEach(item => { if(item.dico) dadosLimpos[String(item.dico)] = item; });
                } else {
                    Object.keys(fonte).forEach(key => { dadosLimpos[String(key)] = fonte[key]; });
                }

                camada = L.geoJSON(cacheGeoJSON, {
                    style: (f) => {
                        const dico = String(f.properties.DICO);
                        const rcmVal = (dadosLimpos[dico] && dadosLimpos[dico].data) ? dadosLimpos[dico].data.rcm : null;
                        return { fillColor: rcmVal ? coresRisco[rcmVal] : "#333", weight: 1, color: "#555", fillOpacity: 0.7 };
                    },
                    onEachFeature: (f, l) => {
                        const dico = String(f.properties.DICO);
                        const item = dadosLimpos[dico];

                        if (item && item.data) {
                            const d = item.data;
                            
                            // Tenta encontrar as variáveis mesmo que o IPMA mude os nomes
                            const tMax = obterValor(d, ["tMax", "tmax", "TMax", "temp_max"]);
                            const hrMin = obterValor(d, ["hrMin", "hrmin", "HRMin", "hr_min"]);
                            const vento = obterValor(d, ["ff_dir_id", "ff_dir", "dirVento"]);
                            const rcm = d.rcm || 1;

                            const classeTemp = (parseFloat(tMax) > 30) ? "temp-alerta" : "";

                            l.bindPopup(`
                                <b>${f.properties.Concelho || "Concelho"}</b><br>
                                <b style="color:${coresRisco[rcm]}">Risco ${nomesRisco[rcm]}</b>
                                <table class="tab-meteo">
                                    <tr><td>🌡️ T. Máxima</td><td class="${classeTemp}">${tMax}ºC</td></tr>
                                    <tr><td>💧 H. Mínima</td><td>${hrMin}%</td></tr>
                                    <tr><td>💨 Vento</td><td>${vento}</td></tr>
                                </table>
                            `);
                        }
                    }
                }).addTo(map);
            } catch (err) { console.error(err); }
        }

        const legenda = L.control({position: 'bottomright'});
        legenda.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>RISCO IPMA</b><br>';
            for (let i in coresRisco) div.innerHTML += `<i style="background:${coresRisco[i]}"></i> ${nomesRisco[i]}<br>`;
            return div;
        };
        legenda.addTo(map);

        mudarDia(0);
    </script>
</body>
</html>
