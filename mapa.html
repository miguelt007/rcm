<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="utf-8">

<title>Mapa de Risco de Incêndio em Portugal</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#b30000;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#controls{
padding:10px;
background:white;
border-bottom:1px solid #ccc;
text-align:center;
}

#map{
height:85vh;
}

.legenda{
background:white;
padding:10px;
line-height:18px;
box-shadow:0 0 5px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<header>
Mapa de Risco de Incêndio em Portugal
</header>

<div id="controls">

Selecionar dia:

<select id="dia">
<option value="0">Hoje</option>
<option value="1">Amanhã</option>
</select>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([39.6,-8],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap'}
).addTo(map);

let geoLayer;
let riscos={};

function corRisco(r){

return{
1:"#00cc00",
2:"#ffff00",
3:"#ff9900",
4:"#ff3300",
5:"#660000"
}[r] || "#cccccc";

}

function nomeRisco(r){

return{
1:"Reduzido",
2:"Moderado",
3:"Elevado",
4:"Muito Elevado",
5:"Máximo"
}[r] || "Sem dados";

}

async function carregarRisco(dia){

const url="https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d"+dia+".json";

const res=await fetch(url);

const data=await res.json();

riscos={};

Object.values(data.local).forEach(c=>{

riscos[c.DICO]=c.data.rcm;

});

}

function estilo(feature){

const id=feature.properties.DICO;

const risco=riscos[id];

return{

fillColor:corRisco(risco),
weight:0.6,
color:"#555",
fillOpacity:0.8

};

}

async function carregarMapa(){

const geo=await fetch("concelhos.geojson").then(r=>r.json());

geoLayer=L.geoJSON(geo,{
style:estilo,
onEachFeature:(feature,layer)=>{

const id=feature.properties.DICO;

const risco=riscos[id];

layer.bindTooltip(
feature.properties.concelho+
"<br>Risco: "+nomeRisco(risco)
);

}
}).addTo(map);

}

async function atualizar(dia){

await carregarRisco(dia);

if(geoLayer){
map.removeLayer(geoLayer);
}

await carregarMapa();

}

document.getElementById("dia").addEventListener("change",e=>{

atualizar(e.target.value);

});

atualizar(0);

const legenda=L.control({position:"bottomright"});

legenda.onAdd=function(){

const div=L.DomUtil.create("div","legenda");

div.innerHTML=
"<b>Risco de Incêndio</b><br>"+
"<i style='background:#00cc00;width:12px;height:12px;display:inline-block'></i> Reduzido<br>"+
"<i style='background:#ffff00;width:12px;height:12px;display:inline-block'></i> Moderado<br>"+
"<i style='background:#ff9900;width:12px;height:12px;display:inline-block'></i> Elevado<br>"+
"<i style='background:#ff3300;width:12px;height:12px;display:inline-block'></i> Muito Elevado<br>"+
"<i style='background:#660000;width:12px;height:12px;display:inline-block'></i> Máximo";

return div;

};

legenda.addTo(map);

</script>

</body>
</html>
