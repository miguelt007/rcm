<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>IPMA - Risco Rural + Meteo Real</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; font-family: sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4400; color: #ff4400; font-weight: bold; }
        #map { height: calc(100vh - 60px); width: 100%; }
        .controles { position: absolute; top: 80px; left: 20px; z-index: 1000; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .active { background: #ff4400 !important; }
        .leaflet-popup-content { text-align: center; min-width: 220px; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        td { border: 1px solid #eee; padding: 5px; text-align: left; }
    </style>
</head>
<body>

<div id="topbar">MONITORIZAÇÃO IPMA: RISCO + METEOROLOGIA</div>
<div class="controles">
    <button id="btn0" class="btn active" onclick="carregar(0)">HOJE</button>
    <button id="btn1" class="btn" onclick="carregar(1)">AMANHÃ</button>
</div>
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([39.5, -8.3], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const cores = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
const nomes = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

let camada;
let geojsonCache = null;

async function carregar(dia) {
    document.getElementById('btn0').classList.toggle('active', dia === 0);
    document.getElementById('btn1').classList.toggle('active', dia === 1);
    
    if (camada) map.removeLayer(camada);

    const proxy = "https://corsproxy.io/?";
    // URL 1: Risco de Incêndio
    const urlRisco = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`;
    // URL 2: Previsão Meteorológica Diária (Geral para todos os concelhos)
    const urlMeteo = `https://api.ipma.pt/open-data/forecast/meteorology/cities/daily/hp-daily-forecast-day${dia}.json`;

    try {
        if (!geojsonCache) {
            geojsonCache = await fetch("concelhos-simples.geojson").then(r => r.json());
        }

        // Fazemos os dois pedidos ao mesmo tempo
        const [resRisco, resMeteo] = await Promise.all([
            fetch(proxy + encodeURIComponent(urlRisco)).then(r => r.json()),
            fetch(proxy + encodeURIComponent(urlMeteo)).then(r => r.json())
        ]);

        const dadosRisco = resRisco.local || (resRisco.rcmF && resRisco.rcmF[0].local);
        // Criamos um mapa da meteorologia usando o idArea (que muitas vezes coincide com o início do DICO)
        const listaMeteo = resMeteo.data || resMeteo;

        camada = L.geoJSON(geojsonCache, {
            style: (f) => {
                const d = String(f.properties.DICO);
                const info = dadosRisco[d];
                const rcmVal = (info && info.data) ? info.data.rcm : (info ? info.rcm : null);
                return { fillColor: rcmVal ? cores[rcmVal] : "#333", weight: 1, color: "#444", fillOpacity: 0.7 };
            },
            onEachFeature: (f, l) => {
                const d = String(f.properties.DICO);
                const infoRisco = dadosRisco[d];
                
                // Tentamos encontrar a meteorologia correspondente (usando o DICO ou o nome do concelho)
                const infoMeteo = listaMeteo.find(m => String(m.globalIdLocal).startsWith(d.substring(0,2))) || {};

                const rcm = (infoRisco && infoRisco.data) ? infoRisco.data.rcm : (infoRisco ? infoRisco.rcm : 1);
                
                // Se o RCM vier com meteo (raro), usamos. Se não, usamos a API de cidades.
                const tMax = (infoRisco && infoRisco.data && infoRisco.data.tMax) ? infoRisco.data.tMax : (infoMeteo.tMax || "--");
                const tMin = (infoRisco && infoRisco.data && infoRisco.data.tMin) ? infoRisco.data.tMin : (infoMeteo.tMin || "--");
                const vento = (infoRisco && infoRisco.data && infoRisco.data.ff_dir_id) ? infoRisco.data.ff_dir_id : (infoMeteo.predWindDir || "--");

                l.bindPopup(`
                    <b>${f.properties.Concelho}</b><br>
                    <b style="color:${cores[rcm]}">Risco ${nomes[rcm]}</b>
                    <table>
                        <tr><td>🌡️ Temp Máx</td><td><b>${tMax}ºC</b></td></tr>
                        <tr><td>🌡️ Temp Mín</td><td><b>${tMin}ºC</b></td></tr>
                        <tr><td>💨 Vento</td><td><b>${vento}</b></td></tr>
                    </table>
                `);
            }
        }).addTo(map);

    } catch (e) { console.error("Erro:", e); }
}

carregar(0);
</script>
</body>
</html>
