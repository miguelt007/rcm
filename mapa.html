<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco e Meteorologia Real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: 'Segoe UI', Arial, sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4400; height: 75px; flex-shrink: 0; z-index: 2000; }
        #titulo-principal { font-size: 19px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; display: flex; gap: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        
        .leaflet-popup-content { text-align: center; color: #333; min-width: 210px; }
        .popup-img { width: 75px; height: auto; margin: 5px auto; display: block; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; border: 1px solid #eee; }
        .tab-meteo td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        .tab-meteo td:first-child { background: #f8f8f8; font-weight: bold; width: 45%; }
        
        .legend { background: rgba(255, 255, 255, 0.95); padding: 10px; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar"><p id="titulo-principal">Risco de Incêndio e Meteorologia Real</p></div>
<div id="mapIPMA"></div>
<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.5, -8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRisco = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

// IDs de estações principais (Lisboa Geofísico adicionada como prioritária para o distrito 11)
const distritosEstacoes = {
    "01": 1210702, "02": 1210770, "03": 1200545, "04": 1200531, "05": 1200551,
    "06": 1200548, "07": 1210731, "08": 1210818, "09": 1200558, "10": 1210710,
    "11": 1200535, // Lisboa (Geofísico) conforme o teu JSON
    "12": 1210718, "13": 1210609, "14": 1210711, "15": 1210755,
    "16": 1200512, "17": 1200560, "18": 1200562
};

let camadaGeoJSON;
let cacheGeoJSON = null;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    const proxy = "https://api.allorigins.win/get?url=";
    const t = new Date().getTime();

    try {
        if (!cacheGeoJSON) {
            cacheGeoJSON = await fetch("concelhos-simples.geojson").then(r => r.json());
        }

        const urlR = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${t}`);
        const urlO = encodeURIComponent(`https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson?v=${t}`);

        const [resR, resO] = await Promise.all([
            fetch(proxy + urlR).then(r => r.json()).then(d => JSON.parse(d.contents)),
            fetch(proxy + urlO).then(r => r.json()).then(d => JSON.parse(d.contents))
        ]);

        const obsMap = {};
        if (resO && resO.features) {
            resO.features.forEach(f => { 
                const p = f.properties;
                // Mapeamos pelo idEstacao que confirmaste
                obsMap[String(p.idEstacao)] = p; 
            });
        }

        const riscoMap = {};
        Object.values(resR.local).forEach(c => { riscoMap[c.dico] = c.data.rcm; });

        camadaGeoJSON = L.geoJSON(cacheGeoJSON, {
            style: (f) => ({
                fillColor: riscoMap[f.properties.DICO] ? infoRisco[riscoMap[f.properties.DICO]].cor : "#222",
                weight: 1, color: "#444", fillOpacity: 0.6
            }),
            onEachFeature: (f, l) => {
                const dico = f.properties.DICO;
                const rId = riscoMap[dico];
                const distId = dico ? dico.substring(0,2) : "";
                const estID = String(distritosEstacoes[distId]);
                
                // Tenta a estação do distrito, senão procura qualquer uma que tenha dados
                const obs = obsMap[estID] || Object.values(obsMap).find(o => o.temperatura !== -99);

                if(rId) {
                    const info = infoRisco[rId];
                    let content = `<b>${f.properties.Concelho}</b>
                                   <img src="images/${info.img}" class="popup-img">
                                   <b style="color:#d35400">Risco: ${info.nome}</b>`;
                    
                    if(obs) {
                        // Ajustado para os nomes dos campos que enviaste!
                        const tAir = obs.temperatura !== -99 ? obs.temperatura + "ºC" : "--";
                        const hum = obs.humidade !== -99 ? obs.humidade + "%" : "--";
                        const vKM = obs.intensidadeVentoKM !== -99 ? obs.intensidadeVentoKM + " km/h" : "--";

                        content += `<table class="tab-meteo">
                            <tr><td>🌡️ Temp.</td><td>${tAir}</td></tr>
                            <tr><td>💧 Humid.</td><td>${hum}</td></tr>
                            <tr><td>💨 Vento</td><td>${vKM}</td></tr>
                        </table><div style="font-size:9px;color:#777;margin-top:5px;">Estação: ${obs.localEstacao}</div>`;
                    } else {
                        content += `<p style="font-size:11px;color:#999;margin-top:10px;">Meteorologia em atualização...</p>`;
                    }
                    l.bindPopup(content);
                }
            }
        }).addTo(map);

    } catch(err) { console.error("Erro geral", err); }
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRisco) div.innerHTML += `<i style="background:${infoRisco[i].cor}"></i> ${infoRisco[i].nome}<br>`;
    return div;
};
legenda.addTo(map);

mudarDia(0);
</script>
</body>
</html>
