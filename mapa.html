<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="utf-8">
<title>Mapa de Risco de Incêndio</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
background:#111;
color:white;
}

#topbar{
padding:10px;
background:#222;
border-bottom:1px solid #444;
}

#map{
height:90vh;
width:100%;
}

select{
padding:5px;
font-size:16px;
margin-left:10px;
}

.legenda{
background:white;
padding:10px;
line-height:18px;
color:#333;
box-shadow:0 0 5px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<div id="topbar">

Mapa de Risco de Incêndio (IPMA)

<select id="dia">
<option value="0">Hoje</option>
<option value="1">Amanhã</option>
</select>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([39.5,-8],7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let camada;
let riscoPorDico = {};

// cores por risco
function corRisco(r){

return {
1:"#00cc00",
2:"#ffff00",
3:"#ff9900",
4:"#ff3300",
5:"#990000"
}[r] || "#999";

}

// nome do risco
function nomeRisco(r){

return {
1:"Reduzido",
2:"Moderado",
3:"Elevado",
4:"Muito Elevado",
5:"Máximo"
}[r] || "Sem dados";

}

async function carregar(dia){

const url = "https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d"+dia+".json";

const resposta = await fetch(url);

const dados = await resposta.json();

riscoPorDico = {};

Object.values(dados.local).forEach(c=>{

riscoPorDico[c.dico] = c.data.rcm;

});

if(camada) map.removeLayer(camada);

const geo = await fetch("concelhos.geojson");
const concelhos = await geo.json();

camada = L.geoJSON(concelhos,{

style:function(feature){

const dico = feature.properties.DICO;
const risco = riscoPorDico[dico];

return{
color:"#444",
weight:1,
fillColor:corRisco(risco),
fillOpacity:0.7
};

},

onEachFeature:function(feature,layer){

const nome = feature.properties.Concelho;
const dico = feature.properties.DICO;
const risco = riscoPorDico[dico];

layer.bindPopup(

"<b>"+nome+"</b><br>"+
"<b>Risco:</b> "+nomeRisco(risco)

);

}

});

camada.addTo(map);

}

// carregar hoje
carregar(0);

// mudar dia
document.getElementById("dia").addEventListener("change",e=>{

carregar(e.target.value);

});


// legenda

const legenda = L.control({position:'bottomright'});

legenda.onAdd = function(){

const div = L.DomUtil.create('div','legenda');

div.innerHTML =
"<b>Risco de Incêndio</b><br>"+
"<i style='background:#00cc00;width:12px;height:12px;display:inline-block'></i> Reduzido<br>"+
"<i style='background:#ffff00;width:12px;height:12px;display:inline-block'></i> Moderado<br>"+
"<i style='background:#ff9900;width:12px;height:12px;display:inline-block'></i> Elevado<br>"+
"<i style='background:#ff3300;width:12px;height:12px;display:inline-block'></i> Muito Elevado<br>"+
"<i style='background:#990000;width:12px;height:12px;display:inline-block'></i> Máximo";

return div;

};

legenda.addTo(map);

</script>

</body>
</html>
