<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa Risco IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; }
        #mapIPMA { height: 100vh; width: 100vw; background: #050505; }
        .controles { position: absolute; top: 10px; left: 50px; z-index: 1000; display: flex; gap: 5px; }
        .btn-dia { background: #222; color: #fff; border: 1px solid #444; padding: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; min-width: 180px; }
        .popup-img { width: 80px; margin: 10px 0; }
        .legend { background: white; padding: 10px; line-height: 18px; border-radius: 5px; font-size: 12px; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; }
    </style>
</head>
<body>

<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<div id="mapIPMA"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.5, -8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const cores = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
const nomes = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

let camada;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camada) map.removeLayer(camada);

    const proxy = "https://api.allorigins.win/get?url=";
    const urlRisco = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`);

    try {
        // 1. Carregar Concelhos (Local - Não deve falhar)
        const geo = await fetch("concelhos-simples.geojson").then(r => r.json());

        // 2. Carregar Risco (Remoto)
        let riscoData = {};
        try {
            const res = await fetch(proxy + urlRisco).then(r => r.json());
            const parsed = JSON.parse(res.contents);
            Object.values(parsed.local).forEach(item => { riscoData[item.dico] = item.data.rcm; });
        } catch(e) { console.error("Falha no Risco IPMA"); }

        // 3. Desenhar Mapa (Se o risco falhar, desenha a cinzento para não ficar vazio)
        camada = L.geoJSON(geo, {
            style: (f) => ({
                fillColor: riscoData[f.properties.DICO] ? cores[riscoData[f.properties.DICO]] : "#222",
                weight: 0.5, color: "#444", fillOpacity: 0.7
            }),
            onEachFeature: (f, l) => {
                const r = riscoData[f.properties.DICO];
                if(r) {
                    l.bindPopup(`<b>${f.properties.Concelho}</b><br>Risco: ${nomes[r]}`);
                }
            }
        }).addTo(map);

    } catch(err) {
        alert("Erro Crítico: Verifica se o ficheiro 'concelhos-simples.geojson' está na pasta.");
    }
}

const legend = L.control({position: 'bottomright'});
legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco Incêndio</b><br>';
    for (let i in cores) div.innerHTML += `<i style="background:${cores[i]}"></i> ${nomes[i]}<br>`;
    return div;
};
legend.addTo(map);

mudarDia(0);
</script>
</body>
</html>
