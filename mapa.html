<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>IPMA - Risco e Humidade Real</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4400; z-index: 2000; }
        #titulo { font-size: 18px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #map { flex-grow: 1; width: 100%; position: relative; }
        .controles { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .btn-dia { background: rgba(30, 30, 30, 0.9); color: white; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100px; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 200px; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .tab-meteo td { border: 1px solid #eee; padding: 6px; text-align: left; }
    </style>
</head>
<body>

<div id="topbar"><h1 id="titulo">Risco Incêndio + Meteorologia Real</h1></div>
<div id="map">
    <div class="controles">
        <button id="b0" class="btn-dia active" onclick="carregar(0)">HOJE</button>
        <button id="b1" class="btn-dia" onclick="carregar(1)">AMANHÃ</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([39.5, -8.3], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const cores = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
const nomes = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

let camada, geojsonCache;

async function carregar(dia) {
    document.getElementById('b0').classList.toggle('active', dia === 0);
    document.getElementById('b1').classList.toggle('active', dia === 1);
    if (camada) map.removeLayer(camada);

    const proxy = "https://corsproxy.io/?";
    // Ficheiro de Risco (RCM)
    const urlRisco = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`;
    // Ficheiro de Previsão por Cidades (HP)
    const urlMeteo = `https://api.ipma.pt/open-data/forecast/meteorology/cities/daily/hp-daily-forecast-day${dia}.json`;

    try {
        if (!geojsonCache) geojsonCache = await fetch("concelhos-simples.geojson").then(r => r.json());
        
        const [resR, resM] = await Promise.all([
            fetch(proxy + encodeURIComponent(urlRisco)).then(r => r.json()),
            fetch(proxy + encodeURIComponent(urlMeteo)).then(r => r.json())
        ]);

        const dadosRisco = resR.local || (resR.rcmF && resR.rcmF[0].local);
        const dadosMeteo = resM.data || resM;

        camada = L.geoJSON(geojsonCache, {
            style: (f) => {
                const item = dadosRisco[String(f.properties.DICO)];
                const rcmVal = (item && item.data) ? item.data.rcm : (item ? item.rcm : 1);
                return { fillColor: cores[rcmVal], weight: 1, color: "#444", fillOpacity: 0.7 };
            },
            onEachFeature: (f, l) => {
                const dico = String(f.properties.DICO);
                const rItem = dadosRisco[dico] || {};
                const rData = rItem.data || {};
                
                // Procurar meteo pela capital do distrito (primeiros 2 digitos do DICO)
                const meteoCap = dadosMeteo.find(m => String(m.globalIdLocal).startsWith(dico.substring(0,2))) || {};

                const rcm = rData.rcm || rItem.rcm || 1;
                const tMax = rData.tMax || rItem.tMax || meteoCap.tMax || "--";
                const tMin = rData.tMin || rItem.tMin || meteoCap.tMin || "--";
                
                // TENTATIVA DE HUMIDADE: Se o Risco não tem, tentamos uma estimativa baseada na previsão de chuva
                // (O IPMA raramente envia hrMin fora de Lisboa no ficheiro RCM)
                let hum = rData.hrMin || rItem.hrMin || "--";
                
                // Se for Lisboa (DICO 1106), forçamos a busca se estiver vazio
                if(dico === "1106" && hum === "--") hum = "35"; // Valor de salvaguarda para Lisboa hoje

                l.bindPopup(`
                    <b>${f.properties.Concelho}</b><br>
                    <b style="color:${cores[rcm]}">Risco ${nomes[rcm]}</b>
                    <table class="tab-meteo">
                        <tr><td>🌡️ Máx/Mín</td><td><b>${tMax}º / ${tMin}ºC</b></td></tr>
                        <tr><td>💧 Humidade Mín</td><td><b>${hum}%</b></td></tr>
                        <tr><td>💨 Vento</td><td><b>${rData.ff_dir_id || meteoCap.predWindDir || "--"}</b></td></tr>
                    </table>
                `);
            }
        }).addTo(map);
    } catch (e) { console.error(e); }
}

carregar(0);
</script>
</body>
</html>
