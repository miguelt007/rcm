<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Risco IPMA - Solução Total</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; display: flex; flex-direction: column; font-family: sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4400; color: #ff4400; font-weight: bold; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: flex; gap: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 220px; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .tab-meteo td { border: 1px solid #eee; padding: 5px; text-align: left; }
        .tab-meteo td:first-child { background: #f9f9f9; font-weight: bold; width: 50%; }
    </style>
</head>
<body>

<div id="topbar">Monitorização de Risco Rural - IPMA</div>
<div id="mapIPMA"></div>
<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.6, -8.1], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRisco = {
    1: { nome: "Reduzido", cor: "#00cc00" },
    2: { nome: "Moderado", cor: "#ffff00" },
    3: { nome: "Elevado", cor: "#ff9900" },
    4: { nome: "Muito Elevado", cor: "#ff3300" },
    5: { nome: "Máximo", cor: "#990000" }
};

let cacheGeoJSON = null;
let camadaGeoJSON;

async function fetchComFallback(url) {
    // Lista de proxies para tentar um por um
    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
    ];

    for (const p of proxies) {
        try {
            console.log("A tentar proxy:", p);
            const response = await fetch(p + encodeURIComponent(url), { method: 'GET' });
            if (response.ok) return await response.json();
        } catch (e) {
            console.warn("Proxy falhou, a tentar o próximo...");
        }
    }
    throw new Error("Todos os proxies falharam");
}

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    try {
        // 1. GeoJSON Local
        if (!cacheGeoJSON) {
            cacheGeoJSON = await fetch("concelhos-simples.geojson").then(r => r.json());
        }

        // 2. Dados IPMA com Fallback de Proxy
        const urlIPMA = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${new Date().getTime()}`;
        const resR = await fetchComFallback(urlIPMA);
        const dadosMap = resR.local;

        // 3. Desenhar
        camadaGeoJSON = L.geoJSON(cacheGeoJSON, {
            style: (f) => {
                const dico = String(f.properties.DICO);
                const rcmVal = (dadosMap[dico] && dadosMap[dico].data) ? dadosMap[dico].data.rcm : null;
                return {
                    fillColor: rcmVal ? infoRisco[rcmVal].cor : "#333",
                    weight: 1, color: "#444", fillOpacity: 0.7
                };
            },
            onEachFeature: (f, l) => {
                const dico = String(f.properties.DICO);
                const info = dadosMap[dico];

                let content = `<b>${f.properties.Concelho}</b><br>`;
                if (info && info.data) {
                    const d = info.data;
                    content += `<b style="color:${infoRisco[d.rcm].cor}">Risco: ${infoRisco[d.rcm].nome}</b>
                                <table class="tab-meteo">
                                    <tr><td>🌡️ T. Máx</td><td>${d.tMax}ºC</td></tr>
                                    <tr><td>💧 H. Mín</td><td>${d.hrMin}%</td></tr>
                                    <tr><td>💨 Vento</td><td>Dir: ${d.ff_dir_id}</td></tr>
                                </table>`;
                } else {
                    content += `<br><small>Dados indisponíveis para este concelho.</small>`;
                }
                l.bindPopup(content);
            }
        }).addTo(map);

    } catch (err) {
        console.error("Falha total:", err);
        // Se tudo falhar, desenha o mapa a cinzento para não ficar vazio
        camadaGeoJSON = L.geoJSON(cacheGeoJSON, {
            style: { fillColor: "#333", weight: 1, color: "#444", fillOpacity: 0.5 }
        }).addTo(map);
    }
}

mudarDia(0);
</script>
</body>
</html>
