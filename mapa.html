<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="utf-8">
<title>Mapa de Risco de Incêndio</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
}

#topbar{
padding:10px;
background:#222;
color:white;
font-size:20px;
text-align:center;
}

#map{
height:92vh;
width:100%;
}

.legenda{
background:white;
padding:10px;
line-height:18px;
box-shadow:0 0 5px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div id="topbar">
Mapa de Risco de Incêndio (IPMA)
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([39.5,-8],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let riscoPorDico = {};

// cores do risco
function corRisco(r){

return {
1:"#00cc00",
2:"#ffff00",
3:"#ff9900",
4:"#ff3300",
5:"#990000"
}[r] || "#999";

}

// nome do risco
function nomeRisco(r){

return {
1:"Reduzido",
2:"Moderado",
3:"Elevado",
4:"Muito Elevado",
5:"Máximo"
}[r];

}

async function carregar(){

// API IPMA
const resposta = await fetch("https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json");

const dados = await resposta.json();

// criar tabela DICO -> risco
Object.values(dados.local).forEach(c => {

riscoPorDico[c.dico] = c.data.rcm;

});

// carregar concelhos
const geo = await fetch("concelhos.geojson");
const concelhos = await geo.json();

L.geoJSON(concelhos,{

style:function(feature){

const dico = feature.properties.DICO;
const risco = riscoPorDico[dico];

return{

color:"#333",
weight:1,
fillColor:corRisco(risco),
fillOpacity:0.7

};

},

onEachFeature:function(feature,layer){

const nome = feature.properties.Concelho;
const dico = feature.properties.DICO;
const risco = riscoPorDico[dico];

layer.bindPopup(

"<b>"+nome+"</b><br>"+
"Risco: "+nomeRisco(risco)

);

}

}).addTo(map);

}

carregar();


// legenda

const legenda = L.control({position:'bottomright'});

legenda.onAdd = function(){

const div = L.DomUtil.create('div','legenda');

div.innerHTML =
"<b>Risco de Incêndio</b><br>"+
"<i style='background:#00cc00;width:12px;height:12px;display:inline-block'></i> Reduzido<br>"+
"<i style='background:#ffff00;width:12px;height:12px;display:inline-block'></i> Moderado<br>"+
"<i style='background:#ff9900;width:12px;height:12px;display:inline-block'></i> Elevado<br>"+
"<i style='background:#ff3300;width:12px;height:12px;display:inline-block'></i> Muito Elevado<br>"+
"<i style='background:#990000;width:12px;height:12px;display:inline-block'></i> Máximo";

return div;

};

legenda.addTo(map);

</script>

</body>
</html>
