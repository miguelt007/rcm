<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comparativo: IPMA vs EFFIS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    body { font-family: Arial; margin: 0; background: #111; color: white; overflow: hidden; }
    #topbar { background: #222; padding: 10px; text-align: center; border-bottom: 1px solid #444; height: 60px; }
    
    /* Contentor dos mapas lado a lado */
    #map-container { display: flex; height: calc(100vh - 80px); width: 100vw; }
    .map-box { width: 50%; height: 100%; border-right: 1px solid #444; position: relative; }
    .label-map { 
        position: absolute; top: 10px; left: 50px; z-index: 1000; 
        background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-weight: bold;
    }
    #mapIPMA, #mapEFFIS { width: 100%; height: 100%; }

    .legenda { background: white; padding: 8px; color: #333; font-size: 12px; line-height: 14px; }
    .popup-img { width: 60px; height: auto; margin: 5px auto; display: block; }
</style>
</head>
<body>

<div id="topbar">
    <div style="font-size: 18px; font-weight: bold;">Comparativo de Risco de Incêndio</div>
    <div style="font-size: 12px; color: #bbb;">IPMA (Concelhos) vs EFFIS (Mancha Térmica)</div>
</div>

<div id="map-container">
    <div class="map-box">
        <div class="label-map">IPMA (Hoje)</div>
        <div id="mapIPMA"></div>
    </div>
    <div class="map-box">
        <div class="label-map">EFFIS (Previsão D+2)</div>
        <div id="mapEFFIS"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// --- CONFIGURAÇÃO COMUM ---
const limitesPT = [[36.8,-9.7], [42.3,-6]];

// --- MAPA 1: IPMA ---
const mapIPMA = L.map('mapIPMA').fitBounds(limitesPT);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapIPMA);

// --- MAPA 2: EFFIS ---
const mapEFFIS = L.map('mapEFFIS').fitBounds(limitesPT);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapEFFIS);

// Camada WMS do EFFIS (Previsão para daqui a 2 dias - o que o IPMA não dá na API)
const camadaEFFIS = L.tileLayer.wms("https://maps.wildfire.vgt.vito.be/gwc/service/wms", {
    layers: 'fwi.max.d2', 
    format: 'image/png',
    transparent: true,
    opacity: 0.7,
    attribution: "© EFFIS/Copernicus"
}).addTo(mapEFFIS);

// --- SINCRONIZAÇÃO DOS MAPAS ---
function sincronizar(e) {
    const targetMap = (e.target === mapIPMA) ? mapEFFIS : mapIPMA;
    targetMap.setView(e.target.getCenter(), e.target.getZoom(), { animate: false });
}

mapIPMA.on('move', sincronizar);
mapEFFIS.on('move', sincronizar);

// --- LÓGICA DE DADOS IPMA (Resumo do que já tínhamos) ---
async function carregarIPMA() {
    const resp = await fetch("https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json");
    const dados = await resp.json();
    const riscoPorDico = {};
    Object.values(dados.local).forEach(c => riscoPorDico[c.dico] = c.data.rcm);

    const geoResp = await fetch("concelhos-simples.geojson");
    const concelhos = await geoResp.json();

    L.geoJSON(concelhos, {
        style: (f) => ({
            fillColor: f.properties.DICO && riscoPorDico[f.properties.DICO] ? obterCor(riscoPorDico[f.properties.DICO]) : "#999",
            weight: 1, color: "#444", fillOpacity: 0.7
        }),
        onEachFeature: (f, l) => {
            const r = riscoPorDico[f.properties.DICO];
            l.bindPopup(`<b>${f.properties.Concelho}</b><br>Risco IPMA: <b>${r || 'N/A'}</b>`);
        }
    }).addTo(mapIPMA);
}

function obterCor(r) {
    return {1:"#00cc00", 2:"#ffff00", 3:"#ff9900", 4:"#ff3300", 5:"#990000"}[r] || "#999";
}

carregarIPMA();
</script>
</body>
</html>
