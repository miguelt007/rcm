<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco e Meteorologia Real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4400; z-index: 2000; }
        #titulo-principal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 19px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #0a0a0a; }
        .controles { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; display: flex; gap: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 220px; font-family: 'Segoe UI', Arial, sans-serif; }
        .popup-img { width: 75px; height: auto; margin: 5px auto; display: block; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; border: 1px solid #eee; }
        .tab-meteo td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        .tab-meteo td:first-child { background: #f8f8f8; font-weight: bold; width: 45%; }
        .legend { background: rgba(255, 255, 255, 0.9); padding: 10px; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar"><p id="titulo-principal">Risco de Incêndio e Meteorologia Real</p></div>
<div id="mapIPMA"></div>
<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.5, -8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRiscoIPMA = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

// IDs de estações principais (atualizados para a API de observação horária)
const distritosParaEstacao = {
    "01": 1210702, "02": 1210770, "03": 1200545, "04": 1200531, "05": 1200551,
    "06": 1200548, "07": 1210731, "08": 1210818, "09": 1200558, "10": 1210710,
    "11": 1210734, "12": 1210718, "13": 1210609, "14": 1210711, "15": 1210755,
    "16": 1200512, "17": 1200560, "18": 1200562
};

let camadaGeoJSON;
let dadosGeoJSONLocal = null;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    const proxy = "https://api.allorigins.win/get?url=";
    const t = new Date().getTime();

    try {
        if (!dadosGeoJSONLocal) {
            dadosGeoJSONLocal = await fetch("concelhos-simples.geojson").then(r => r.json());
        }

        const urlRisco = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${t}`);
        // API alternativa mais leve (Observações de superfície simples)
        const urlObs = encodeURIComponent(`https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson?v=${t}`);

        const [resRisco, resObs] = await Promise.all([
            fetch(proxy + urlRisco).then(r => r.json()).then(d => JSON.parse(d.contents)),
            fetch(proxy + urlObs).then(r => r.json()).then(d => JSON.parse(d.contents))
        ]);

        const obsMap = {};
        if (resObs && resObs.features) {
            resObs.features.forEach(f => {
                const p = f.properties;
                // Só guardamos se tiver dados válidos
                if (p.temperatura !== -99) {
                    obsMap[p.idEstacao] = p;
                }
            });
        }

        const riscoPorDico = {};
        Object.values(resRisco.local).forEach(c => { riscoPorDico[c.dico] = c.data.rcm; });

        camadaGeoJSON = L.geoJSON(dadosGeoJSONLocal, {
            style: (f) => ({
                fillColor: riscoPorDico[f.properties.DICO] ? infoRiscoIPMA[riscoPorDico[f.properties.DICO]].cor : "#333",
                weight: 1, color: "#555", fillOpacity: 0.6
            }),
            onEachFeature: (f, l) => {
                const dico = f.properties.DICO;
                const r = riscoPorDico[dico];
                const estID = distritosParaEstacao[dico ? dico.substring(0,2) : ""];
                
                // Procura a estação do distrito ou a primeira disponível como fallback real
                const o = obsMap[estID] || Object.values(obsMap)[0];

                let html = `<b style="font-size:16px;">${f.properties.Concelho}</b>`;
                if(r) {
                    html += `<img src="images/${infoRiscoIPMA[r].img}" class="popup-img">
                             <b style="color:#d35400">Risco: ${infoRiscoIPMA[r].nome}</b>`;
                }

                if(o) {
                    html += `<table class="tab-meteo">
                        <tr><td>🌡️ Temp.</td><td>${o.temperatura}ºC</td></tr>
                        <tr><td>💧 Humid.</td><td>${o.humidade}%</td></tr>
                        <tr><td>💨 Vento</td><td>${o.intensidadeVento} km/h</td></tr>
                    </table><div style="font-size:9px;color:#777;margin-top:5px;">Estação: ${o.localEstacao}</div>`;
                } else {
                    html += `<p style="font-size:11px;color:#999;margin-top:10px;">⚠️ Dados IPMA indisponíveis no momento.</p>`;
                }
                l.bindPopup(html);
            }
        }).addTo(map);

    } catch(err) { console.error("Erro:", err); }
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRiscoIPMA) div.innerHTML += `<i style="background:${infoRiscoIPMA[i].cor}"></i> ${infoRiscoIPMA[i].nome}<br>`;
    return div;
};
legenda.addTo(map);

mudarDia(0);
</script>
</body>
</html>
