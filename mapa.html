<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>IPMA Risco Rural</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; font-family: sans-serif; }
        #mapIPMA { height: 100vh; width: 100%; }
        .controles { position: absolute; top: 10px; left: 50px; z-index: 1000; }
        .btn-dia { background: #222; color: #fff; border: 1px solid #444; padding: 10px; cursor: pointer; font-weight: bold; }
        .btn-dia.active { background: #ff4400; }
        .leaflet-popup-content { text-align: center; min-width: 180px; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 5px; font-size: 12px; }
        .tab-meteo td { border: 1px solid #eee; padding: 4px; text-align: left; }
    </style>
</head>
<body>

<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>
<div id="mapIPMA"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.5, -8.3], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const coresRisco = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
const nomesRisco = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

let camada;
let cacheGeoJSON;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camada) map.removeLayer(camada);

    // Proxy mais estável para evitar o "Offline"
    const proxy = "https://corsproxy.io/?";
    const urlIPMA = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`;

    try {
        if (!cacheGeoJSON) {
            cacheGeoJSON = await fetch("concelhos-simples.geojson").then(r => r.json());
        }

        const res = await fetch(proxy + encodeURIComponent(urlIPMA)).then(r => r.json());
        const dadosIPMA = res.local; 

        camada = L.geoJSON(cacheGeoJSON, {
            style: (f) => {
                const d = String(f.properties.DICO);
                // Aceder a dadosIPMA[d].data para chegar ao rcm
                const rcm = (dadosIPMA[d] && dadosIPMA[d].data) ? dadosIPMA[d].data.rcm : null;
                return {
                    fillColor: rcm ? coresRisco[rcm] : "#333",
                    weight: 1, color: "#444", fillOpacity: 0.7
                };
            },
            onEachFeature: (f, l) => {
                const d = String(f.properties.DICO);
                const item = dadosIPMA[d];

                if(item && item.data) {
                    const m = item.data; // Aqui estão os valores que deram undefined
                    let html = `<b>${f.properties.Concelho}</b><br>`;
                    html += `<b style="color:${coresRisco[m.rcm]}">Risco: ${nomesRisco[m.rcm]}</b>`;
                    html += `<table class="tab-meteo">
                                <tr><td>🌡️ T. Máx</td><td>${m.tMax}ºC</td></tr>
                                <tr><td>💧 H. Mín</td><td>${m.hrMin}%</td></tr>
                                <tr><td>💨 Vento</td><td>${m.ff_dir_id}</td></tr>
                             </table>`;
                    l.bindPopup(html);
                } else {
                    l.bindPopup(`<b>${f.properties.Concelho}</b><br>Sem dados para esta data.`);
                }
            }
        }).addTo(map);

    } catch(e) { 
        console.error(e);
        alert("Erro ao ligar ao IPMA. Tente recarregar a página.");
    }
}

mudarDia(0);
</script>
</body>
</html>
