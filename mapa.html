<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco e Meteorologia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4400; height: 75px; flex-shrink: 0; z-index: 2000; position: relative; }
        #titulo-principal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 19px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        
        .controles { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; display: flex; gap: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }

        /* Estilo da Tabela no Popup */
        .leaflet-popup-content { text-align: center; color: #333; min-width: 180px; font-family: 'Segoe UI', Arial, sans-serif; }
        .popup-img { width: 70px; height: auto; margin: 5px auto; display: block; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .tab-meteo td { border: 1px solid #ddd; padding: 4px; text-align: left; }
        .tab-meteo td:first-child { background: #f4f4f4; font-weight: bold; width: 50%; }
        
        .legend { background: rgba(255, 255, 255, 0.95); padding: 10px; color: #111; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar">
    <p id="titulo-principal">Risco de Incêndio e Meteorologia (IPMA)</p>
</div>

<div id="mapIPMA"></div>

<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const limitesPT = [[36.8,-10.5], [42.3,-6]];
const map = L.map('mapIPMA').setView([39.5, -8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRiscoIPMA = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

let camadaGeoJSON;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    try {
        const proxy = "https://api.allorigins.win/get?url=";
        
        // 1. Risco de Incêndio
        const urlRisco = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`);
        const respRisco = await fetch(proxy + urlRisco).then(r => r.json());
        const dadosRisco = JSON.parse(respRisco.contents);

        // 2. Meteorologia (Previsão diária por localidade)
        const urlMeteo = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/cities/daily/hp-daily-forecast-day${dia}.json`);
        const respMeteo = await fetch(proxy + urlMeteo).then(r => r.json());
        const dadosMeteo = JSON.parse(respMeteo.contents);

        // 3. GeoJSON Local
        const geo = await fetch("concelhos-simples.geojson").then(r => r.json());

        const riscoPorDico = {};
        Object.values(dadosRisco.local).forEach(c => { riscoPorDico[c.dico] = c.data.rcm; });

        // Mapear meteo por GlobalIdLocal (que associaremos ao DICO)
        const meteoMap = {};
        dadosMeteo.data.forEach(m => { meteoMap[m.globalIdLocal] = m; });

        camadaGeoJSON = L.geoJSON(geo, {
            style: (f) => ({ 
                fillColor: riscoPorDico[f.properties.DICO] ? infoRiscoIPMA[riscoPorDico[f.properties.DICO]].cor : "transparent", 
                weight: 1, color: "#444", fillOpacity: 0.6 
            }),
            onEachFeature: (f, l) => {
                const r = riscoPorDico[f.properties.DICO];
                // Como o GeoJSON não tem GlobalID, o IPMA usa frequentemente os mesmos IDs para cidades principais. 
                // Tentaremos obter os dados se o GLOBALID estiver presente ou via mapeamento.
                const m = meteoMap[f.properties.GLOBALID]; 

                if(r) {
                    const info = infoRiscoIPMA[r];
                    let popupHtml = `
                        <b style="font-size:14px; display:block;">${f.properties.Concelho}</b>
                        <img src="images/${info.img}" class="popup-img">
                        <b>Risco: ${info.nome}</b>
                    `;

                    // Se houver dados meteorológicos para este ID
                    if(m) {
                        popupHtml += `
                        <table class="tab-meteo">
                            <tr><td>🌡️ Temp.</td><td>${m.tMin}º / ${m.tMax}ºC</td></tr>
                            <tr><td>💨 Vento</td><td>${m.ffWind} km/h</td></tr>
                            <tr><td>💧 Humidade</td><td>${m.precipitaProb}%</td></tr>
                            <tr><td>🌧️ Precip.</td><td>${m.precipitaProb}% prob.</td></tr>
                        </table>`;
                    } else {
                        popupHtml += `<p style="font-size:10px; color: #999; margin-top:5px;">Dados meteorológicos detalhados indisponíveis para este concelho.</p>`;
                    }

                    l.bindPopup(popupHtml);
                }
            }
        }).addTo(map);

    } catch(e) { console.error("Erro no carregamento."); }
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRiscoIPMA) div.innerHTML += `<i style="background:${infoRiscoIPMA[i].cor}"></i> ${infoRiscoIPMA[i].nome}<br>`;
    return div;
};
legenda.addTo(map);

mudarDia(0);
</script>
</body>
</html>
