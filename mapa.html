<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="utf-8">
<title>Mapa de Risco de Incêndio em Portugal</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

header{
background:#b30000;
color:white;
text-align:center;
padding:15px;
font-size:24px;
font-weight:bold;
}

#controls{
padding:10px;
text-align:center;
background:#f4f4f4;
border-bottom:1px solid #ccc;
}

#map{
height:85vh;
}

</style>

</head>

<body>

<header>
Mapa de Risco de Incêndio em Portugal
</header>

<div id="controls">

Dia:

<select id="dia">
<option value="0">Hoje</option>
<option value="1">Amanhã</option>
</select>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([39.6,-8],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ attribution:'© OpenStreetMap'}
).addTo(map);

let dadosIPMA=[];
let geoLayer;

function corRisco(r){

return {
1:"#00cc00",
2:"#ffff00",
3:"#ff9900",
4:"#ff3300",
5:"#660000"
}[r] || "#cccccc";

}

function nomeRisco(r){

return {
1:"Reduzido",
2:"Moderado",
3:"Elevado",
4:"Muito Elevado",
5:"Máximo"
}[r] || "Sem dados";

}

async function carregarRisco(dia){

const url="https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d"+dia+".json";

const res=await fetch(url);
const json=await res.json();

dadosIPMA = Object.values(json.local);

}

function encontrarRisco(lat,lon){

let menor=Infinity;
let risco=null;

dadosIPMA.forEach(c=>{

const dist = Math.sqrt(
Math.pow(c.latitude-lat,2)+
Math.pow(c.longitude-lon,2)
);

if(dist<menor){
menor=dist;
risco=c.data.rcm;
}

});

return risco;

}

function estilo(feature){

const bounds = L.geoJSON(feature).getBounds();
const centro = bounds.getCenter();

const risco = encontrarRisco(centro.lat,centro.lng);

return{
fillColor:corRisco(risco),
color:"#555",
weight:0.5,
fillOpacity:0.7
};

}

async function carregarMapa(){

const geo = await fetch(
"https://raw.githubusercontent.com/codeforgermany/click_that_hood/main/public/data/portugal-municipalities.geojson"
).then(r=>r.json());

geoLayer=L.geoJSON(geo,{
style:estilo,
onEachFeature:(feature,layer)=>{

const centro=layer.getBounds().getCenter();

const risco=encontrarRisco(
centro.lat,
centro.lng
);

layer.bindTooltip(
feature.properties.name +
"<br>Risco: " + nomeRisco(risco)
);

}
}).addTo(map);

}

async function atualizar(dia){

await carregarRisco(dia);

if(geoLayer){
map.removeLayer(geoLayer);
}

await carregarMapa();

}

document.getElementById("dia").addEventListener("change",e=>{
atualizar(e.target.value);
});

atualizar(0);

</script>

</body>
</html>
