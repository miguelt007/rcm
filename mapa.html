<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Mapa de Risco de Incêndio</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial;}
#topbar{padding:10px;background:#333;color:white;text-align:center;font-weight:bold;font-size:20px;}
#controls{padding:10px;background:#f2f2f2;border-bottom:1px solid #ccc;text-align:center;}
#map{height:90vh;width:100%;}
.legenda{background:white;padding:10px;line-height:18px;color:#333;box-shadow:0 0 5px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<div id="topbar">Mapa de Risco de Incêndio em Portugal (Continente)</div>

<div id="controls">
Selecionar dia:
<select id="dia">
<option value="0">Hoje</option>
<option value="1">Amanhã</option>
</select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Inicializar mapa
const map = L.map('map').setView([39.5,-8],7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',
  subdomains:'abcd',
  maxZoom:19
}).addTo(map);

let camada;
let concelhos = {};
let riscosIPMA = {};

// cores e nomes de risco
function corRisco(r){ return {1:"#00cc00",2:"#ffff00",3:"#ff9900",4:"#ff3300",5:"#990000"}[r] || "#999"; }
function nomeRisco(r){ return {1:"Reduzido",2:"Moderado",3:"Elevado",4:"Muito Elevado",5:"Máximo"}[r] || "Sem dados"; }

// carregar concelhos.json (DICO -> nome)
async function carregarConcelhos(){
  const res = await fetch('concelhos.json'); // deve estar na mesma pasta
  concelhos = await res.json();
}

// carregar risco IPMA
async function carregarRisco(dia){
  const url = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`;
  const res = await fetch(url);
  const data = await res.json();
  riscosIPMA = {};
  Object.values(data.local).forEach(c=>{
    if(c.dico.length===4) riscosIPMA[c.dico] = { risco: c.data.rcm, lat: c.latitude, lon: c.longitude };
  });
}

// desenhar pontos
function desenharMapa(){
  if(camada) map.removeLayer(camada);
  camada = L.layerGroup();

  Object.keys(riscosIPMA).forEach(dico=>{
    const c = riscosIPMA[dico];
    const nome = concelhos[dico] || "Sem nome";
    const risco = c.risco;

    const marker = L.circleMarker([c.lat, c.lon],{
      radius:7,
      color: corRisco(risco),
      fillColor: corRisco(risco),
      fillOpacity:0.85,
      weight:1
    });

    marker.bindTooltip(`<b>${nome}</b><br>Alerta: ${nomeRisco(risco)}`, {sticky:true});
    marker.bindPopup(`<b>Concelho:</b> ${nome}<br><b>Alerta:</b> ${nomeRisco(risco)}`);

    marker.addTo(camada);
  });

  camada.addTo(map);
}

// atualizar mapa
async function atualizar(dia){
  await carregarRisco(dia);
  desenharMapa();
}

// inicialização
async function init(){
  await carregarConcelhos();
  await atualizar(0);
}
init();

// selector Hoje/Amanhã
document.getElementById("dia").addEventListener("change", e=>{
  atualizar(e.target.value);
});

// legenda
const legenda = L.control({position:'bottomright'});
legenda.onAdd = function(){
  const div = L.DomUtil.create('div','legenda');
  div.innerHTML =
    "<b>Risco de Incêndio</b><br>"+
    "<i style='background:#00cc00;width:12px;height:12px;display:inline-block'></i> Reduzido<br>"+
    "<i style='background:#ffff00;width:12px;height:12px;display:inline-block'></i> Moderado<br>"+
    "<i style='background:#ff9900;width:12px;height:12px;display:inline-block'></i> Elevado<br>"+
    "<i style='background:#ff3300;width:12px;height:12px;display:inline-block'></i> Muito Elevado<br>"+
    "<i style='background:#990000;width:12px;height:12px;display:inline-block'></i> Máximo";
  return div;
};
legenda.addTo(map);

</script>
</body>
</html>
