<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco de Incêndio Rural</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
   <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: 'Segoe UI', Arial, sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4400; z-index: 2000; }
        #titulo-principal { font-size: 20px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; top: 100px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 12px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 220px; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; border: 1px solid #eee; }
        .tab-meteo td { border: 1px solid #eee; padding: 7px; text-align: left; }
        .tab-meteo td:first-child { background: #f9f9f9; font-weight: bold; color: #555; }
        .temp-alerta { color: #d32f2f; font-weight: bold; }
        .legend { background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 5px; font-weight: bold; font-size: 11px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .legend i { width: 15px; height: 15px; float: left; margin-right: 8px; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="topbar"><h1 id="titulo-principal">Risco de Incêndio Rural - IPMA</h1></div>

    <div class="controles">
        <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
        <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
    </div>

    <div id="mapIPMA"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('mapIPMA').setView([39.5, -8.3], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const coresRisco = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
        const nomesRisco = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

        let camada;
        let cacheGeoJSON = null;

        async function mudarDia(dia, btn) {
            if(btn) {
                document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            if (camada) map.removeLayer(camada);

            const proxy = "https://corsproxy.io/?";
            const urlIPMA = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${new Date().getTime()}`;

            try {
                if (!cacheGeoJSON) {
                    const rGeo = await fetch("concelhos-simples.geojson");
                    cacheGeoJSON = await rGeo.json();
                }

                const resp = await fetch(proxy + encodeURIComponent(urlIPMA));
                const resR = await resp.json();
                
                // --- CAPTURA EXATA DOS DADOS ---
                // Verifica se os dados estão em resR.local ou se vieram dentro de uma lista rcmF[0]
                let dadosIPMA = resR.local;
                if (!dadosIPMA && resR.rcmF && resR.rcmF[0]) {
                    dadosIPMA = resR.rcmF[0].local;
                } else if (!dadosIPMA && Array.isArray(resR)) {
                    dadosIPMA = resR[0].local;
                }
                // -------------------------------

                camada = L.geoJSON(cacheGeoJSON, {
                    style: (f) => {
                        const dico = String(f.properties.DICO);
                        const rcmVal = (dadosIPMA[dico] && dadosIPMA[dico].data) ? dadosIPMA[dico].data.rcm : null;
                        return {
                            fillColor: rcmVal ? coresRisco[rcmVal] : "#333",
                            weight: 1, color: "#555", fillOpacity: 0.7
                        };
                    },
                    onEachFeature: (f, l) => {
                        const dico = String(f.properties.DICO);
                        const item = dadosIPMA ? dadosIPMA[dico] : null;

                        if (item && item.data) {
                            const met = item.data; // Aceder ao objeto 'data'
                            
                            // Extrair valores com fallback para "--" se não existirem
                            const tMax = met.tMax !== undefined ? met.tMax : "--";
                            const hrMin = met.hrMin !== undefined ? met.hrMin : "--";
                            const vento = met.ff_dir_id !== undefined ? met.ff_dir_id : "--";
                            const rcm = met.rcm || 1;

                            // Alerta visual para temperaturas acima de 30ºC
                            const classeTemp = (parseFloat(tMax) > 30) ? "temp-alerta" : "";

                            l.bindPopup(`
                                <div style="text-align:center">
                                    <b>${f.properties.Concelho || "Concelho"}</b><br>
                                    <b style="color:${coresRisco[rcm]}">Risco ${nomesRisco[rcm]}</b>
                                    <table class="tab-meteo">
                                        <tr><td>🌡️ Temp. Máxima</td><td class="${classeTemp}">${tMax}ºC</td></tr>
                                        <tr><td>💧 Humidade Mín.</td><td>${hrMin}%</td></tr>
                                        <tr><td>💨 Vento (Dir)</td><td>${vento}</td></tr>
                                    </table>
                                </div>
                            `);
                        } else {
                            l.bindPopup(`<b>${f.properties.Concelho}</b><br><small>Dados indisponíveis (DICO: ${dico})</small>`);
                        }
                    }
                }).addTo(map);

            } catch (err) {
                console.error("Erro no processamento:", err);
            }
        }

        const legenda = L.control({position: 'bottomright'});
        legenda.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<b>RISCO IPMA</b><br><br>';
            for (let i in coresRisco) {
                div.innerHTML += `<i style="background:${coresRisco[i]}"></i> ${nomesRisco[i]}<br>`;
            }
            return div;
        };
        legenda.addTo(map);

        mudarDia(0);
    </script>
</body>
</html>
