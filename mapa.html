<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPMA vs EFFIS - Monitorização Total</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    body { font-family: 'Segoe UI', Arial; margin: 0; background: #000; color: white; overflow: hidden; }
    #topbar { background: #1a1a1a; padding: 10px; text-align: center; border-bottom: 2px solid #333; height: 75px; box-sizing: border-box; }
    
    #map-container { display: flex; height: calc(100vh - 75px); width: 100vw; }
    .map-box { width: 50%; height: 100%; border-right: 1px solid #333; position: relative; }
    
    .label-map { 
        position: absolute; top: 15px; left: 60px; z-index: 1000; 
        background: rgba(0,0,0,0.85); padding: 8px 15px; border-radius: 5px; 
        font-weight: bold; border: 1px solid #ff4400; font-size: 14px;
    }

    /* Legenda IPMA */
    .legend {
        background: rgba(255, 255, 255, 0.95); padding: 12px; color: #111;
        font-size: 12px; line-height: 20px; border-radius: 8px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5); font-weight: bold;
    }
    .legend i { width: 18px; height: 18px; float: left; margin-right: 10px; border-radius: 3px; }

    /* Botões EFFIS */
    #controles-effis {
        position: absolute; bottom: 30px; left: 15px; z-index: 1000;
        background: rgba(0,0,0,0.9); padding: 12px; border-radius: 10px;
        display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; 
        border: 1px solid #444; width: 220px;
    }
    .btn-dia {
        background: #333; color: white; border: 1px solid #555; padding: 6px;
        cursor: pointer; border-radius: 4px; font-size: 11px; text-align: center;
    }
    .btn-dia.active { background: #ff4400; border-color: #fff; font-weight: bold; }

    #mapIPMA, #mapEFFIS { width: 100%; height: 100%; background: #050505; }
</style>
</head>
<body>

<div id="topbar">
    <div style="font-size: 18px; font-weight: bold; color: #ff4400;">MAPA DE RISCO DE INCÊNDIO</div>
    <div id="info-dia" style="font-size: 13px; color: #bbb; margin-top: 4px;">EFFIS: Previsão Atualizada (D+0)</div>
</div>

<div id="map-container">
    <div class="map-box">
        <div class="label-map">DADOS OFICIAIS IPMA</div>
        <div id="mapIPMA"></div>
    </div>
    <div class="map-box">
        <div class="label-map">PREVISÃO COPERNICUS (EFFIS)</div>
        <div id="mapEFFIS"></div>
        
        <div id="controles-effis">
            <div style="grid-column: span 5; font-size: 11px; margin-bottom: 5px; color: #ff4400; text-transform: uppercase;">Selecionar Dia de Previsão:</div>
            <button class="btn-dia active" onclick="mudarDiaEFFIS(0, this)">D0</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(1, this)">D1</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(2, this)">D2</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(3, this)">D3</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(4, this)">D4</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(5, this)">D5</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(6, this)">D6</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(7, this)">D7</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(8, this)">D8</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(9, this)">D9</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const limitesPT = [[36.8,-10.5], [42.3,-6]];

// --- MAPA 1: IPMA ---
const mapIPMA = L.map('mapIPMA', { zoomControl: true }).fitBounds(limitesPT);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapIPMA);

// --- MAPA 2: EFFIS ---
const mapEFFIS = L.map('mapEFFIS', { zoomControl: false }).fitBounds(limitesPT);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapEFFIS);

// --- FUNÇÃO PARA COR DO RISCO ---
function obterCor(r) {
    return {
        1: "#00cc00", // Reduzido
        2: "#ffff00", // Moderado
        3: "#ff9900", // Elevado
        4: "#ff3300", // Muito Elevado
        5: "#990000"  // Máximo
    }[r] || "transparent";
}

// --- CAMADA EFFIS (URL ESTÁVEL COPERNICUS) ---
let camadaEFFIS = L.tileLayer.wms("https://maps.wildfire.vgt.vito.be/gwc/service/wms", {
    layers: 'fwi.max.d0',
    format: 'image/png',
    transparent: true,
    version: '1.1.1',
    opacity: 0.75,
    attribution: "© EFFIS Copernicus"
}).addTo(mapEFFIS);

function mudarDiaEFFIS(dia, btn) {
    document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('info-dia').innerText = `EFFIS: Previsão para D+${dia}`;

    mapEFFIS.removeLayer(camadaEFFIS);
    camadaEFFIS = L.tileLayer.wms("https://maps.wildfire.vgt.vito.be/gwc/service/wms", {
        layers: `fwi.max.d${dia}`,
        format: 'image/png',
        transparent: true,
        version: '1.1.1',
        opacity: 0.75
    }).addTo(mapEFFIS);
}

// --- SINCRONIZAÇÃO DE MOVIMENTO ---
mapIPMA.on('drag zoom', () => {
    mapEFFIS.setView(mapIPMA.getCenter(), mapIPMA.getZoom(), { animate: false });
});
mapEFFIS.on('drag zoom', () => {
    mapIPMA.setView(mapEFFIS.getCenter(), mapEFFIS.getZoom(), { animate: false });
});

// --- LEGENDA IPMA COMPLETA ---
const legenda = L.control({position: 'bottomleft'});
legenda.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    const niveis = [
        { c: "#00cc00", n: "Reduzido" },
        { c: "#ffff00", n: "Moderado" },
        { c: "#ff9900", n: "Elevado" },
        { c: "#ff3300", n: "Muito Elevado" },
        { c: "#990000", n: "Máximo" }
    ];
    div.innerHTML = '<div style="margin-bottom:5px; border-bottom:1px solid #ccc">Risco IPMA</div>';
    niveis.forEach(l => {
        div.innerHTML += `<i style="background:${l.c}"></i> ${l.n}<br>`;
    });
    return div;
};
legenda.addTo(mapIPMA);

// --- CARREGAR DADOS IPMA ---
async function carregarIPMA() {
    try {
        const resp = await fetch("https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json");
        const dados = await resp.json();
        const riscoPorDico = {};
        Object.values(dados.local).forEach(c => riscoPorDico[c.dico] = c.data.rcm);

        const geoResp = await fetch("concelhos-simples.geojson");
        const concelhos = await geoResp.json();

        L.geoJSON(concelhos, {
            style: (f) => ({
                fillColor: obterCor(riscoPorDico[f.properties.DICO]),
                weight: 1, color: "#444", fillOpacity: 0.6
            }),
            onEachFeature: (f, l) => {
                const rNum = riscoPorDico[f.properties.DICO];
                const nomes = {1:"Reduzido", 2:"Moderado", 3:"Elevado", 4:"Muito Elevado", 5:"Máximo"};
                l.bindPopup(`<b>${f.properties.Concelho}</b><br>Risco: <b>${nomes[rNum] || 'N/A'}</b>`);
            }
        }).addTo(mapIPMA);
    } catch(e) { console.error("Erro ao carregar IPMA"); }
}

carregarIPMA();
</script>
</body>
</html>
