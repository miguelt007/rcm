<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco e Observação Real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4400; height: 75px; flex-shrink: 0; z-index: 2000; position: relative; }
        #titulo-principal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 19px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px; display: flex; gap: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 200px; font-family: 'Segoe UI', Arial, sans-serif; }
        .popup-img { width: 70px; height: auto; margin: 5px auto; display: block; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .tab-meteo td { border: 1px solid #ddd; padding: 5px; text-align: left; }
        .tab-meteo td:first-child { background: #f8f8f8; font-weight: bold; width: 45%; }
        .legend { background: rgba(255, 255, 255, 0.95); padding: 10px; color: #111; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar">
    <p id="titulo-principal">Risco (Previsão) vs Meteorologia (Real)</p>
</div>

<div id="mapIPMA"></div>

<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">DADOS ATUAIS (D0)</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ (D1)</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.5, -8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRiscoIPMA = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

// Mapeamento de Distrito para Estação Meteorológica Real (ID da Estação no GeoJSON do IPMA)
const distritosParaEstacao = {
    "01": "1210702", "02": "1210770", "03": "1200545", "04": "1200531", "05": "1200551",
    "06": "1200548", "07": "1210731", "08": "1210818", "09": "1200558", "10": "1210710",
    "11": "1210734", "12": "1210718", "13": "1210609", "14": "1210711", "15": "1210755",
    "16": "1200512", "17": "1200560", "18": "1200562"
};

let camadaGeoJSON;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    try {
        const proxy = "https://api.allorigins.win/get?url=";
        const urlRisco = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`);
        // API de Observações de Superfície (Dados Reais)
        const urlObs = encodeURIComponent(`https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson`);

        const [resRisco, resObs, geo] = await Promise.all([
            fetch(proxy + urlRisco).then(r => r.json()).then(d => JSON.parse(d.contents)),
            fetch(proxy + urlObs).then(r => r.json()).then(d => JSON.parse(d.contents)),
            fetch("concelhos-simples.geojson").then(r => r.json())
        ]);

        const riscoPorDico = {};
        Object.values(resRisco.local).forEach(c => { riscoPorDico[c.dico] = c.data.rcm; });

        // Mapear observações por ID de Estação
        const obsMap = {};
        resObs.features.forEach(f => { obsMap[f.properties.idEstacao] = f.properties; });

        camadaGeoJSON = L.geoJSON(geo, {
            style: (f) => ({ 
                fillColor: riscoPorDico[f.properties.DICO] ? infoRiscoIPMA[riscoPorDico[f.properties.DICO]].cor : "transparent", 
                weight: 1, color: "#444", fillOpacity: 0.6 
            }),
            onEachFeature: (f, l) => {
                const dico = f.properties.DICO;
                const r = riscoPorDico[dico];
                const distId = dico.substring(0, 2);
                const estacaoId = distritosParaEstacao[distId];
                const obs = obsMap[estacaoId];

                if(r) {
                    const info = infoRiscoIPMA[r];
                    let popupHtml = `<b style="font-size:15px; display:block;">${f.properties.Concelho}</b><img src="images/${info.img}" class="popup-img"><b>Risco: ${info.nome}</b>`;

                    if(obs) {
                        // Extração dos dados reais do GeoJSON de observação
                        const temp = obs.temperatura !== -99 ? obs.temperatura + "ºC" : "S/D";
                        const hum = obs.humidade !== -99 ? obs.humidade + "%" : "S/D";
                        const vento = obs.intensidadeVento !== -99 ? obs.intensidadeVento + " km/h" : "S/D";
                        const prec = obs.precipitacaoAcumulada !== -99 ? obs.precipitacaoAcumulada + " mm" : "0.0 mm";

                        popupHtml += `
                        <table class="tab-meteo">
                            <tr><td>🌡️ Temperatura</td><td>${temp}</td></tr>
                            <tr><td>💧 Humidade</td><td>${hum}</td></tr>
                            <tr><td>💨 Vento</td><td>${vento}</td></tr>
                            <tr><td>🌧️ Precipitação</td><td>${prec}</td></tr>
                        </table>
                        <div style="font-size:9px; color:#777; margin-top:5px;">Estação: ${obs.localEstacao}</div>`;
                    }
                    l.bindPopup(popupHtml);
                }
            }
        }).addTo(map);
    } catch(e) { console.error("Erro na leitura das APIs"); }
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRiscoIPMA) div.innerHTML += `<i style="background:${infoRiscoIPMA[i].cor}"></i> ${infoRiscoIPMA[i].nome}<br>`;
    return div;
};
legenda.addTo(map);

mudarDia(0);
</script>
</body>
</html>
