<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>IPMA Risco Rural - Versão Final</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; font-family: sans-serif; color: white; }
        #map { height: 100vh; width: 100%; background: #050505; }
        .controles { position: absolute; top: 20px; left: 50px; z-index: 1000; display: flex; gap: 10px; }
        .btn { background: #222; color: #fff; border: 1px solid #444; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .active { background: #ff4400 !important; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 200px; }
        .tab { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .tab td { border: 1px solid #eee; padding: 5px; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

<div class="controles">
    <button id="btn0" class="btn active" onclick="carregar(0)">HOJE</button>
    <button id="btn1" class="btn" onclick="carregar(1)">AMANHÃ</button>
</div>
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([39.5, -8.3], 7);
// Fundo do mapa alternativo mais leve
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const cores = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
const nomes = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

let camada;
let geojsonLocal = null;

async function carregar(dia) {
    // UI
    document.getElementById('btn0').classList.toggle('active', dia === 0);
    document.getElementById('btn1').classList.toggle('active', dia === 1);
    if (camada) map.removeLayer(camada);

    const proxy = "https://api.allorigins.win/raw?url=";
    const url = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${Date.now()}`;

    try {
        if (!geojsonLocal) {
            geojsonLocal = await fetch("concelhos-simples.geojson").then(r => r.json());
        }

        const raw = await fetch(proxy + encodeURIComponent(url)).then(r => r.json());
        
        // Garantir que chegamos ao objeto 'local' (seja via rcmF ou direto)
        const dados = raw.local || (raw.rcmF && raw.rcmF[0].local) || raw[0].local;

        camada = L.geoJSON(geojsonLocal, {
            style: (f) => {
                const d = String(f.properties.DICO);
                const r = (dados[d] && dados[d].data) ? dados[d].data.rcm : null;
                return { fillColor: r ? cores[r] : "#333", weight: 1, color: "#444", fillOpacity: 0.7 };
            },
            onEachFeature: (f, l) => {
                const d = String(f.properties.DICO);
                const info = dados[d];

                if (info && info.data) {
                    const m = info.data;
                    const t = m.tMax || m.tmax || "--";
                    const h = m.hrMin || m.hrmin || "--";
                    const v = m.ff_dir_id || "--";
                    const r = m.rcm || 1;

                    l.bindPopup(`
                        <b>${f.properties.Concelho}</b><br>
                        <b style="color:${cores[r]}">Risco ${nomes[r]}</b>
                        <table class="tab">
                            <tr><td>🌡️ Temp. Máx</td><td><b>${t}ºC</b></td></tr>
                            <tr><td>💧 Hum. Mín</td><td><b>${h}%</b></td></tr>
                            <tr><td>💨 Vento</td><td><b>${v}</b></td></tr>
                        </table>
                    `);
                }
            }
        }).addTo(map);
    } catch (e) { console.error("Erro:", e); }
}

carregar(0);
</script>
</body>
</html>
