<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mapa Risco IPMA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; font-family: sans-serif; }
        #mapIPMA { height: 100vh; width: 100%; background: #050505; }
        .controles { position: absolute; top: 20px; left: 50px; z-index: 1000; display: flex; gap: 10px; }
        .btn-dia { background: #222; color: #fff; border: 1px solid #444; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; min-width: 200px; color: #333; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .tab-meteo td { border: 1px solid #eee; padding: 5px; text-align: left; }
        .tab-meteo td:first-child { background: #f9f9f9; font-weight: bold; }
    </style>
</head>
<body>

<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<div id="mapIPMA"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.5, -8.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const coresRisco = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
const nomesRisco = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

let camada;
let cacheGeoJSON;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camada) map.removeLayer(camada);

    const proxy = "https://api.allorigins.win/raw?url=";
    const urlIPMA = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`;

    try {
        if (!cacheGeoJSON) {
            cacheGeoJSON = await fetch("concelhos-simples.geojson").then(r => r.json());
        }

        const res = await fetch(proxy + encodeURIComponent(urlIPMA)).then(r => r.json());
        const dadosIPMA = res.local; // O objeto que contém os DICOs

        camada = L.geoJSON(cacheGeoJSON, {
            style: (f) => {
                let d = String(f.properties.DICO).padStart(4, '0');
                let rcm = (dadosIPMA[d] && dadosIPMA[d].data) ? dadosIPMA[d].data.rcm : null;
                return {
                    fillColor: rcm ? coresRisco[rcm] : "#333",
                    weight: 1, color: "#555", fillOpacity: 0.7
                };
            },
            onEachFeature: (f, l) => {
                let d = String(f.properties.DICO).padStart(4, '0');
                let info = dadosIPMA[d];

                if(info && info.data) {
                    const met = info.data;
                    let txt = `<b>${f.properties.Concelho}</b><br>`;
                    txt += `<b style="color:${met.rcm > 2 ? 'red' : 'green'}">Risco: ${nomesRisco[met.rcm]}</b>`;
                    txt += `<table class="tab-meteo">`;
                    txt += `<tr><td>🌡️ T. Máx</td><td>${met.tMax}ºC</td></tr>`;
                    txt += `<tr><td>💧 H. Mín</td><td>${met.hrMin}%</td></tr>`;
                    txt += `<tr><td>💨 Vento</td><td>${met.ff_dir_id} (${met.ff_int_id})</td></tr>`;
                    txt += `</table>`;
                    l.bindPopup(txt);
                }
            }
        }).addTo(map);

    } catch(e) { console.error("Erro:", e); }
}

mudarDia(0);
</script>
</body>
</html>
