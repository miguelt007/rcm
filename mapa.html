<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mapa de Risco de Incêndio</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

#topbar{
background:#222;
padding:10px;
text-align:center;
border-bottom:1px solid #444;
}

#titulo{
font-size:22px;
font-weight:bold;
margin-bottom:5px;
}

#data{
font-size:14px;
color:#bbb;
margin-bottom:8px;
}

#filtro{
margin-top:5px;
}

select{
padding:6px;
font-size:16px;
}

#map{
height:88vh;
width:100%;
}

.legenda{
background:white;
padding:10px;
line-height:18px;
color:#333;
box-shadow:0 0 6px rgba(0,0,0,0.4);
}

/* mobile */

@media (max-width:600px){

#titulo{
font-size:18px;
}

select{
font-size:14px;
}

#map{
height:85vh;
}

}

</style>

</head>

<body>

<div id="topbar">

<div id="titulo">
Mapa de Risco de Incêndio
</div>

<div id="data">
A carregar...
</div>

<div id="filtro">

Selecionar dia:

<select id="dia">
<option value="0">Hoje</option>
<option value="1">Amanhã</option>
</select>

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([39.5,-8],7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let camada;
let riscoPorDico = {};

function corRisco(r){

return {
1:"#00cc00",
2:"#ffff00",
3:"#ff9900",
4:"#ff3300",
5:"#990000"
}[r] || "#999";

}

function nomeRisco(r){

return {
1:"Reduzido",
2:"Moderado",
3:"Elevado",
4:"Muito Elevado",
5:"Máximo"
}[r] || "Sem dados";

}

async function carregar(dia){

const url="https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d"+dia+".json";

const resposta=await fetch(url);
const dados=await resposta.json();

document.getElementById("data").innerHTML =
"Relatório IPMA: "+dados.fileDate;

riscoPorDico={};

Object.values(dados.local).forEach(c=>{

riscoPorDico[c.dico]=c.data.rcm;

});

if(camada) map.removeLayer(camada);

const geo=await fetch("concelhos.geojson");
const concelhos=await geo.json();

camada=L.geoJSON(concelhos,{

style:function(feature){

const risco=riscoPorDico[feature.properties.DICO];

return{
color:"#444",
weight:1,
fillColor:corRisco(risco),
fillOpacity:0.75
};

},

onEachFeature:function(feature,layer){

const nome=feature.properties.Concelho;
const risco=riscoPorDico[feature.properties.DICO];

layer.bindPopup(

"<b>"+nome+"</b><br>"+
"Risco: "+nomeRisco(risco)

);

layer.on({

mouseover:function(e){

const l=e.target;

l.setStyle({
weight:3,
color:"#fff"
});

l.openPopup();

},

mouseout:function(e){

camada.resetStyle(e.target);
e.target.closePopup();

}

});

}

});

camada.addTo(map);

}

carregar(0);

document.getElementById("dia").addEventListener("change",e=>{

carregar(e.target.value);

});

const legenda=L.control({position:'bottomright'});

legenda.onAdd=function(){

const div=L.DomUtil.create('div','legenda');

div.innerHTML=
"<b>Risco de Incêndio</b><br>"+
"<i style='background:#00cc00;width:12px;height:12px;display:inline-block'></i> Reduzido<br>"+
"<i style='background:#ffff00;width:12px;height:12px;display:inline-block'></i> Moderado<br>"+
"<i style='background:#ff9900;width:12px;height:12px;display:inline-block'></i> Elevado<br>"+
"<i style='background:#ff3300;width:12px;height:12px;display:inline-block'></i> Muito Elevado<br>"+
"<i style='background:#990000;width:12px;height:12px;display:inline-block'></i> Máximo";

return div;

};

legenda.addTo(map);

</script>

</body>
</html>
