<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPMA vs EFFIS - Oficial</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
    body { font-family: Segoe UI, Arial; margin: 0; background: #111; color: white; overflow: hidden; }
    #topbar { background: #222; padding: 10px; text-align: center; border-bottom: 1px solid #444; height: 70px; }
    
    #map-container { display: flex; height: calc(100vh - 90px); width: 100vw; }
    .map-box { width: 50%; height: 100%; border-right: 1px solid #444; position: relative; }
    
    .label-map { 
        position: absolute; top: 10px; left: 50px; z-index: 1000; 
        background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 4px; 
        font-weight: bold; border: 1px solid #555; font-size: 13px;
    }

    #controles-effis {
        position: absolute; bottom: 30px; left: 10px; z-index: 1000;
        background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px;
        display: flex; flex-wrap: wrap; gap: 4px; max-width: 220px; border: 1px solid #444;
    }
    .btn-dia {
        background: #333; color: white; border: 1px solid #555; padding: 4px 8px;
        cursor: pointer; border-radius: 3px; font-size: 10px; min-width: 38px;
    }
    .btn-dia.active { background: #ff4400; border-color: #ff6600; font-weight: bold; }

    #mapIPMA, #mapEFFIS { width: 100%; height: 100%; background: #000; }

    /* Estilo da Legenda IPMA */
    .info.legend {
        background: white; padding: 10px; color: #333; font-size: 12px;
        line-height: 18px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.8; }
</style>
</head>
<body>

<div id="topbar">
    <div style="font-size: 18px; font-weight: bold;">Monitorização de Risco de Incêndio</div>
    <div id="info-dia" style="font-size: 13px; color: #ffb400; margin-top: 5px;">EFFIS: Previsão para Hoje (D+0)</div>
</div>

<div id="map-container">
    <div class="map-box">
        <div class="label-map">IPMA (Concelhos - Hoje)</div>
        <div id="mapIPMA"></div>
    </div>
    <div class="map-box">
        <div class="label-map">EFFIS (Mancha Térmica - Copernicus)</div>
        <div id="mapEFFIS"></div>
        
        <div id="controles-effis">
            <div style="width:100%; font-size:11px; margin-bottom:5px; color:#ffb400; font-weight:bold;">PREVISÃO EFFIS:</div>
            <button class="btn-dia active" onclick="mudarDiaEFFIS(0, this)">D+0</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(1, this)">D+1</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(2, this)">D+2</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(3, this)">D+3</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(4, this)">D+4</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(5, this)">D+5</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(6, this)">D+6</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(7, this)">D+7</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(8, this)">D+8</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(9, this)">D+9</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const limitesPT = [[36.8,-10.5], [42.3,-6]];

// --- MAPA 1: IPMA ---
const mapIPMA = L.map('mapIPMA', { zoomControl: false }).fitBounds(limitesPT);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapIPMA);

// --- MAPA 2: EFFIS ---
const mapEFFIS = L.map('mapEFFIS').fitBounds(limitesPT);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapEFFIS);

// --- CAMADA EFFIS (URL Alternativo mais compatível) ---
let camadaEFFIS = L.tileLayer.wms("https://maps.wildfire.vgt.vito.be/gwc/service/wms", {
    layers: 'fwi.max.d0',
    format: 'image/png',
    transparent: true,
    version: '1.1.1',
    opacity: 0.7,
    uppercase: true,
    attribution: "© EFFIS"
}).addTo(mapEFFIS);

function mudarDiaEFFIS(dia, btn) {
    document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById('info-dia').innerText = `EFFIS: Previsão para D+${dia}`;

    mapEFFIS.removeLayer(camadaEFFIS);
    camadaEFFIS = L.tileLayer.wms("https://maps.wildfire.vgt.vito.be/gwc/service/wms", {
        layers: `fwi.max.d${dia}`,
        format: 'image/png',
        transparent: true,
        version: '1.1.1',
        opacity: 0.7,
        uppercase: true
    }).addTo(mapEFFIS);
}

// --- SINCRONIZAÇÃO ---
mapIPMA.sync = function(other) {
    this.on('move', () => other.setView(this.getCenter(), this.getZoom(), {animate:false}));
};
mapIPMA.on('move', () => mapEFFIS.setView(mapIPMA.getCenter(), mapIPMA.getZoom(), {animate:false}));
mapEFFIS.on('move', () => mapIPMA.setView(mapEFFIS.getCenter(), mapEFFIS.getZoom(), {animate:false}));

// --- LEGENDA IPMA (Recuperada) ---
const legenda = L.control({position: 'bottomleft'});
legenda.onAdd = function() {
    const div = L.DomUtil.create('div', 'info legend');
    const grades = [1, 2, 3, 4, 5];
    const labels = ["Reduzido", "Moderado", "Elevado", "Muito Elevado", "Máximo"];
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i = 0; i < grades.length; i++) {
        div.innerHTML += '<i style="background:' + obterCor(grades[i]) + '"></i> ' + labels[i] + '<br>';
    }
    return div;
};
legenda.addTo(mapIPMA);

// --- DADOS IPMA ---
async function carregarIPMA() {
    try {
        const resp = await fetch("https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json");
        const dados = await resp.json();
        const riscoPorDico = {};
        Object.values(dados.local).forEach(c => riscoPorDico[c.dico] = c.data.rcm);

        const geoResp = await fetch("concelhos-simples.geojson");
        const concelhos = await geoResp.json();

        L.geoJSON(concelhos, {
            style: (f) => ({
                fillColor: obterCor(riscoPorDico[f.properties.DICO]),
                weight: 1, color: "#444", fillOpacity: 0.6
            }),
            onEachFeature: (f, l) => {
                const r = riscoPorDico[f.properties.DICO] || "N/A";
                l.bindPopup(`<b>${f.properties.Concelho}</b><br>Risco: ${r}`);
            }
        }).addTo(mapIPMA);
    } catch(e) { console.log("Erro IPMA"); }
}

function obterCor(r) {
    const cores = {1:"#00cc00", 2:"#ffff00", 3:"#ff9900", 4:"#ff3300", 5:"#990000"};
    return cores[r] || "transparent";
}

carregarIPMA();
</script>
</body>
</html>
