<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco de Incêndio Rural</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: 'Segoe UI', Arial, sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4400; z-index: 2000; }
        #titulo-principal { font-size: 20px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; top: 100px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 12px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 220px; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .tab-meteo td { border: 1px solid #eee; padding: 7px; text-align: left; }
        .tab-meteo td:first-child { background: #f9f9f9; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div id="topbar"><h1 id="titulo-principal">Risco de Incêndio Rural - IPMA</h1></div>

    <div class="controles">
        <button id="btn0" class="btn-dia active" onclick="carregar(0)">HOJE</button>
        <button id="btn1" class="btn-dia" onclick="carregar(1)">AMANHÃ</button>
    </div>

    <div id="mapIPMA"></div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('mapIPMA').setView([39.5, -8.3], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const coresRisco = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
        const nomesRisco = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

        let camada;
        let cacheGeoJSON = null;

        async function carregar(dia) {
            document.getElementById('btn0').className = (dia === 0) ? 'btn-dia active' : 'btn-dia';
            document.getElementById('btn1').className = (dia === 1) ? 'btn-dia active' : 'btn-dia';
            
            if (camada) map.removeLayer(camada);

            const proxy = "https://corsproxy.io/?";
            const urlRisco = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${Date.now()}`;
            const urlPrevisao = `https://api.ipma.pt/open-data/forecast/meteorology/cities/daily/hp-daily-forecast-day${dia}.json`;

            try {
                if (!cacheGeoJSON) {
                    const r = await fetch("concelhos-simples.geojson");
                    cacheGeoJSON = await r.json();
                }

                const [resR, resP] = await Promise.all([
                    fetch(proxy + encodeURIComponent(urlRisco)).then(r => r.json()),
                    fetch(proxy + encodeURIComponent(urlPrevisao)).then(r => r.json())
                ]);

                const dadosRisco = resR.local || (resR.rcmF && resR.rcmF[0].local);
                const dadosPrevisao = resP.data || resP;

                camada = L.geoJSON(cacheGeoJSON, {
                    style: (f) => {
                        const d = String(f.properties.DICO);
                        const item = dadosRisco[d];
                        const rcmVal = (item && item.data) ? item.data.rcm : (item ? item.rcm : null);
                        return { fillColor: rcmVal ? coresRisco[rcmVal] : "#333", weight: 1, color: "#444", fillOpacity: 0.7 };
                    },
                    onEachFeature: (f, l) => {
                        const d = String(f.properties.DICO);
                        const rcmEntry = dadosRisco[d] || {};
                        const rcmData = rcmEntry.data || {};

                        // Tentar dados de previsão se os do RCM falharem (para o resto do país)
                        const prevCap = dadosPrevisao.find(p => String(p.globalIdLocal).startsWith(d.substring(0,2))) || {};

                        // Lógica "Detetive": Se não houver tMax no rcmData, usa o da previsão geral
                        const tMax = rcmData.tMax || rcmEntry.tMax || prevCap.tMax || "--";
                        const hrMin = rcmData.hrMin || rcmEntry.hrMin || "--";
                        const hrMax = rcmData.hrMax || rcmEntry.hrMax || "--";
                        const vento = rcmData.ff_dir_id || rcmEntry.ff_dir_id || prevCap.predWindDir || "--";
                        const rcm = rcmData.rcm || rcmEntry.rcm || 1;

                        l.bindPopup(`
                            <b>${f.properties.Concelho}</b><br>
                            <b style="color:${coresRisco[rcm]}">Risco ${nomesRisco[rcm]}</b>
                            <table class="tab-meteo">
                                <tr><td>🌡️ Temp Máx</td><td><b>${tMax}ºC</b></td></tr>
                                <tr><td>💧 Humidade Mín</td><td><b>${hrMin}%</b></td></tr>
                                <tr><td>💧 Humidade Máx</td><td><b>${hrMax}%</b></td></tr>
                                <tr><td>💨 Vento (Dir)</td><td><b>${vento}</b></td></tr>
                            </table>
                        `);
                    }
                }).addTo(map);
            } catch (err) { console.error(err); }
        }

        carregar(0);
    </script>
</body>
</html>
