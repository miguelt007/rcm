<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monitorização de Risco de Incêndio - IPMA vs COPERNICUS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        #topbar { background: #1a1a1a; padding: 10px; text-align: center; border-bottom: 2px solid #333; height: 85px; box-sizing: border-box; }
        #titulo-principal { font-size: 18px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        
        #map-container { display: flex; height: calc(100vh - 85px); width: 100vw; }
        .map-box { width: 50%; height: 100%; border-right: 1px solid #333; position: relative; }
        
        .label-map { 
            position: absolute; top: 10px; left: 50px; z-index: 1000; 
            background: rgba(0,0,0,0.85); padding: 5px 12px; border-radius: 4px; 
            font-weight: bold; border: 1px solid #444; font-size: 12px;
        }

        /* Seletores de Dias */
        .controles {
            position: absolute; bottom: 20px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.9); padding: 8px; border-radius: 8px;
            display: flex; flex-wrap: wrap; gap: 4px; border: 1px solid #444; max-width: 200px;
        }
        .btn-dia { 
            background: #333; color: white; border: 1px solid #555; padding: 4px 6px; 
            cursor: pointer; border-radius: 3px; font-size: 10px; min-width: 32px;
        }
        .btn-dia.active { background: #ff4400; font-weight: bold; border-color: #fff; }

        /* Legendas */
        .legend { background: rgba(255, 255, 255, 0.9); padding: 8px; color: #111; font-size: 10px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 6px; border-radius: 2px; }

        #mapIPMA, #mapEFFIS { width: 100%; height: 100%; background: #050505; }
        .popup-img { width: 80px; height: auto; margin: 8px auto; display: block; }
        
        /* Correção do PopUp */
        .leaflet-popup-content-wrapper { color: #333; text-align: center; }
        .leaflet-popup-content b { font-weight: bold; }
    </style>
</head>
<body>

<div id="topbar">
    <p id="titulo-principal">Risco de Incêndio: IPMA vs COPERNICUS</p>
    <div style="font-size: 12px; color: #aaa; margin-top: 5px;">Sincronizado: Arraste um mapa para mover o outro</div>
</div>

<div id="map-container">
    <div class="map-box">
        <div class="label-map" id="label-ipma">IPMA: Hoje (D+0)</div>
        <div id="mapIPMA"></div>
        <div class="controles" id="ctrl-ipma">
            <button class="btn-dia active" onclick="mudarDiaIPMA(0, this)">D0</button>
            <button class="btn-dia" onclick="mudarDiaIPMA(1, this)">D1</button>
            <button class="btn-dia" onclick="mudarDiaIPMA(2, this)">D2</button>
        </div>
    </div>

    <div class="map-box">
        <div class="label-map" id="label-effis">EFFIS: Hoje (D+0)</div>
        <div id="mapEFFIS"></div>
        <div class="controles">
            <button class="btn-dia active" onclick="mudarDiaEFFIS(0, this)">D0</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(1, this)">D1</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(2, this)">D2</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(3, this)">D3</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(4, this)">D4</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(5, this)">D5</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(6, this)">D6</button>
            <button class="btn-dia" onclick="mudarDiaEFFIS(7, this)">D7</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const limitesPT = [[36.8,-10.5], [42.3,-6]];
const mapIPMA = L.map('mapIPMA').fitBounds(limitesPT);
const mapEFFIS = L.map('mapEFFIS', { zoomControl: false }).fitBounds(limitesPT);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapIPMA);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapEFFIS);

const infoRiscoIPMA = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

// --- NOVA LÓGICA EFFIS (COM CORS PROXY) ---
// Usamos o corsproxy.io para contornar o bloqueio do Copernicus
function getEffisUrl(dia) {
    const baseUrl = `https://fwi-forecast.jrc.ec.europa.eu/wms?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&LAYERS=fwi_max_d${dia}&STYLES=fwi_max_fixed&FORMAT=image/png&TRANSPARENT=TRUE&CRS=EPSG:3857&WIDTH=256&HEIGHT=256&BBOX={bbox}`;
    return `https://corsproxy.io/?${encodeURIComponent(baseUrl)}`;
}

let camadaEFFIS = L.tileLayer(getEffisUrl(0), {
    opacity: 0.7,
    attribution: '© EFFIS/Copernicus',
    tileSize: 256
}).addTo(mapEFFIS);

function mudarDiaEFFIS(dia, btn) {
    document.querySelectorAll('#mapEFFIS ~ .controles .btn-dia').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('label-effis').innerText = `EFFIS: Previsão D+${dia}`;
    mapEFFIS.removeLayer(camadaEFFIS);
    camadaEFFIS = L.tileLayer(getEffisUrl(dia), { 
        opacity: 0.7,
        tileSize: 256
    }).addTo(mapEFFIS);
}

// --- LOGICA IPMA (COM ALLORIGINS PROXY) ---
let camadaGeoJSON;
async function mudarDiaIPMA(dia, btn) {
    if(btn) {
        document.querySelectorAll('#ctrl-ipma .btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    document.getElementById('label-ipma').innerText = `IPMA: Previsão D+${dia}`;
    if (camadaGeoJSON) mapIPMA.removeLayer(camadaGeoJSON);

    try {
        const urlIPMA = `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d' + dia + '.json')}`;
        const resp = await fetch(urlIPMA).then(r => r.json());
        const dados = JSON.parse(resp.contents);
        const geo = await fetch("concelhos-simples.geojson").then(r => r.json());
        
        const riscoPorDico = {};
        Object.values(dados.local).forEach(c => riscoPorDico[c.dico] = c.data.rcm);

        camadaGeoJSON = L.geoJSON(geo, {
            style: (f) => ({ 
                fillColor: riscoPorDico[f.properties.DICO] ? infoRiscoIPMA[riscoPorDico[f.properties.DICO]].cor : "transparent", 
                weight: 1, color: "#444", fillOpacity: 0.6 
            }),
            onEachFeature: (f, l) => {
                const r = riscoPorDico[f.properties.DICO];
                if(r) {
                    const info = infoRiscoIPMA[r];
                    // CORREÇÃO: Adicionada tag <b> no Risco
                    l.bindPopup(`<div style="padding:5px;"><b style="font-size:15px; display:block;">${f.properties.Concelho}</b><img src="images/${info.img}" class="popup-img"><b>Risco: ${info.nome}</b></div>`);
                }
            }
        }).addTo(mapIPMA);
    } catch(e) { console.error("Erro IPMA"); }
}

// SINCRONIZAÇÃO
mapIPMA.on('drag zoom', () => mapEFFIS.setView(mapIPMA.getCenter(), mapIPMA.getZoom(), {animate:false}));
mapEFFIS.on('drag zoom', () => mapIPMA.setView(mapIPMA.getCenter(), mapIPMA.getZoom(), {animate:false}));

// LEGENDAS
const legIPMA = L.control({position: 'bottomleft'});
legIPMA.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRiscoIPMA) div.innerHTML += `<i style="background:${infoRiscoIPMA[i].cor}"></i> ${infoRiscoIPMA[i].nome}<br>`;
    return div;
};
legIPMA.addTo(mapIPMA);

const legEFFIS = L.control({position: 'bottomright'});
legEFFIS.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>FWI EFFIS</b><br><i style="background:#0000ff"></i> Muito Baixo<br><i style="background:#00ff00"></i> Médio<br><i style="background:#ffff00"></i> Alto<br><i style="background:#ff9900"></i> Muito Alto<br><i style="background:#ff0000"></i> Extremo';
    return div;
};
legEFFIS.addTo(mapEFFIS);

mudarDiaIPMA(0);
</script>
</body>
</html>
