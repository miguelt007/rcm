<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco e Meteorologia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4400; z-index: 2000; }
        #titulo-principal { font-size: 19px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: flex; gap: 8px; border: 1px solid #444; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 210px; }
        .popup-img { width: 75px; height: auto; margin: 5px auto; display: block; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; border: 1px solid #eee; }
        .tab-meteo td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        .tab-meteo td:first-child { background: #f8f8f8; font-weight: bold; width: 45%; }
        .legend { background: rgba(255, 255, 255, 0.9); padding: 10px; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar"><p id="titulo-principal">Risco de Incêndio e Meteorologia</p></div>
<div id="mapIPMA"></div>
<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('mapIPMA').setView([39.6, -8.1], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRisco = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

const distritosEstacoes = {"01":1210702,"02":1210770,"03":1200545,"04":1200531,"05":1200551,"06":1200548,"07":1210731,"08":1210818,"09":1200558,"10":1210710,"11":1200535,"12":1210718,"13":1210609,"14":1210711,"15":1210755,"16":1200512,"17":1200560,"18":1200562};

let camadaGeoJSON;
let cacheGeoJSON = null;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    const proxy = "https://api.allorigins.win/get?url=";
    const t = new Date().getTime();

    try {
        // 1. Carregar Concelhos (LOCAL)
        if (!cacheGeoJSON) {
            const resp = await fetch("concelhos-simples.geojson");
            cacheGeoJSON = await resp.json();
        }

        // 2. Carregar Risco (REMOTO)
        let riscoMap = {};
        try {
            const urlR = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${t}`);
            const resR = await fetch(proxy + urlR).then(r => r.json());
            const dadosR = JSON.parse(resR.contents);
            dadosR.local.forEach(c => { riscoMap[c.dico] = c.data.rcm; });
        } catch(e) { console.error("Erro Risco IPMA"); }

        // 3. Carregar Meteorologia (REMOTO)
        let obsMap = {};
        try {
            const urlO = encodeURIComponent(`https://api.ipma.pt/open-data/observation/meteorology/stations/obs-surface.geojson?v=${t}`);
            const resO = await fetch(proxy + urlO).then(r => r.json());
            const dadosO = JSON.parse(resO.contents);
            dadosO.features.forEach(f => { obsMap[String(f.properties.idEstacao)] = f.properties; });
        } catch(e) { console.error("Erro Meteo IPMA"); }

        // 4. Desenhar Mapa
        camadaGeoJSON = L.geoJSON(cacheGeoJSON, {
            style: (f) => ({
                fillColor: riscoMap[f.properties.DICO] ? infoRisco[riscoMap[f.properties.DICO]].cor : "#333",
                weight: 1, color: "#444", fillOpacity: 0.6
            }),
            onEachFeature: (f, l) => {
                const dico = f.properties.DICO;
                const rId = riscoMap[dico];
                const estID = String(distritosEstacoes[dico ? dico.substring(0,2) : ""]);
                const obs = obsMap[estID] || Object.values(obsMap).find(o => o.temperatura !== -99);

                let content = `<b>${f.properties.Concelho}</b>`;
                if(rId) {
                    content += `<br><img src="images/${infoRisco[rId].img}" class="popup-img"><b style="color:#d35400">Risco: ${infoRisco[rId].nome}</b>`;
                }
                if(obs) {
                    content += `<table class="tab-meteo">
                        <tr><td>🌡️ Temp.</td><td>${obs.temperatura}ºC</td></tr>
                        <tr><td>💧 Humid.</td><td>${obs.humidade}%</td></tr>
                        <tr><td>💨 Vento</td><td>${obs.intensidadeVentoKM || obs.intensidadeVento} km/h</td></tr>
                    </table><div style="font-size:9px;color:#777;margin-top:5px;">Estação: ${obs.localEstacao}</div>`;
                }
                l.bindPopup(content);
            }
        }).addTo(map);

    } catch(err) {
        console.error("Erro crítico:", err);
        alert("O mapa não conseguiu carregar. Verifica se o ficheiro 'concelhos-simples.geojson' existe.");
    }
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRisco) div.innerHTML += `<i style="background:${infoRisco[i].cor}"></i> ${infoRisco[i].nome}<br>`;
    return div;
};
legenda.addTo(map);

mudarDia(0);
</script>
</body>
</html>
