<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>Mapa de Risco de Incêndio</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial;}
#topbar{padding:10px;background:#333;color:white;text-align:center;font-weight:bold;font-size:20px;}
#controls{padding:10px;background:#f2f2f2;border-bottom:1px solid #ccc;text-align:center;}
#map{height:90vh;width:100%;}
.legenda{background:white;padding:10px;line-height:18px;color:#333;box-shadow:0 0 5px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<div id="topbar">Mapa de Risco de Incêndio em Portugal (Incluindo Ilhas)</div>

<div id="controls">
Selecionar dia:
<select id="dia">
<option value="0">Hoje</option>
<option value="1">Amanhã</option>
</select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([39.5,-8],7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',
  subdomains:'abcd',
  maxZoom:19
}).addTo(map);

let camada;

// cores e nomes de risco
function corRisco(r){ return {1:"#00cc00",2:"#ffff00",3:"#ff9900",4:"#ff3300",5:"#990000"}[r] || "#999"; }
function nomeRisco(r){ return {1:"Reduzido",2:"Moderado",3:"Elevado",4:"Muito Elevado",5:"Máximo"}[r] || "Sem dados"; }

// função para obter o concelho real via GeoAPI.pt
async function getConcelho(lat, lon){
    try {
        const res = await fetch(`https://json.geoapi.pt/gps/${lat},${lon}?json=1`);
        const data = await res.json();
        return data.concelho || "Desconhecido";
    } catch(e){
        return "Desconhecido";
    }
}

// carregar dados IPMA
async function carregar(dia){
    const url = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`;
    const resp = await fetch(url);
    const dados = await resp.json();

    if(camada) map.removeLayer(camada);
    camada = L.layerGroup();

    // iterar sobre os concelhos
    for(const id in dados.local){
        const c = dados.local[id];
        const risco = c.data.rcm;
        const lat = c.latitude;
        const lon = c.longitude;

        // obter o nome real do concelho via GeoAPI.pt
        const nomeConcelho = await getConcelho(lat, lon);

        const marker = L.circleMarker([lat, lon], {
            radius:7,
            color: corRisco(risco),
            fillColor: corRisco(risco),
            fillOpacity:0.85,
            weight:1
        });

        marker.bindTooltip(`<b>${nomeConcelho}</b><br>Alerta: ${nomeRisco(risco)}`, {sticky:true});
        marker.bindPopup(`<b>Concelho:</b> ${nomeConcelho}<br><b>Alerta:</b> ${nomeRisco(risco)}`);
        marker.addTo(camada);
    }

    camada.addTo(map);
}

// carregar hoje inicialmente
carregar(0);

// mudar dia
document.getElementById("dia").addEventListener("change", e => {
    carregar(e.target.value);
});

// legenda
const legenda = L.control({position:'bottomright'});
legenda.onAdd = function(){
    const div = L.DomUtil.create('div','legenda');
    div.innerHTML =
        "<b>Risco de Incêndio</b><br>"+
        "<i style='background:#00cc00;width:12px;height:12px;display:inline-block'></i> Reduzido<br>"+
        "<i style='background:#ffff00;width:12px;height:12px;display:inline-block'></i> Moderado<br>"+
        "<i style='background:#ff9900;width:12px;height:12px;display:inline-block'></i> Elevado<br>"+
        "<i style='background:#ff3300;width:12px;height:12px;display:inline-block'></i> Muito Elevado<br>"+
        "<i style='background:#990000;width:12px;height:12px;display:inline-block'></i> Máximo";
    return div;
};
legenda.addTo(map);
</script>

</body>
</html>
