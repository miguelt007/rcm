<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>IPMA - Risco Rural</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; display: flex; flex-direction: column; font-family: sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4400; color: #ff4400; font-weight: bold; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; top: 100px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .btn-dia { background: #333; color: #fff; border: 1px solid #555; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; min-width: 200px; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; border: 1px solid #eee; }
        .tab-meteo td { border: 1px solid #eee; padding: 6px; text-align: left; }
        .temp-alerta { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <div id="topbar">RISCO DE INCÊNDIO E METEOROLOGIA</div>
    <div class="controles">
        <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
        <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
    </div>
    <div id="mapIPMA"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('mapIPMA').setView([39.5, -8.3], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const coresRisco = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
        const nomesRisco = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

        let camada;
        let cacheGeoJSON = null;

        async function mudarDia(dia, btn) {
            if(btn) {
                document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            if (camada) map.removeLayer(camada);

            const proxy = "https://corsproxy.io/?";
            const urlIPMA = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${new Date().getTime()}`;

            try {
                if (!cacheGeoJSON) {
                    const r = await fetch("concelhos-simples.geojson");
                    cacheGeoJSON = await r.json();
                }

                const resp = await fetch(proxy + encodeURIComponent(urlIPMA));
                const resR = await resp.json();
                
                // Mapear os dados do IPMA garantindo que o DICO é a chave
                const dadosIPMA = resR.local;

                camada = L.geoJSON(cacheGeoJSON, {
                    style: (f) => {
                        const d = String(f.properties.DICO);
                        const rcmVal = (dadosIPMA[d] && dadosIPMA[d].data) ? dadosIPMA[d].data.rcm : null;
                        return { 
                            fillColor: rcmVal ? coresRisco[rcmVal] : "#333", 
                            weight: 1, color: "#555", fillOpacity: 0.7 
                        };
                    },
                    onEachFeature: (f, l) => {
                        const d = String(f.properties.DICO);
                        const item = dadosIPMA[d];

                        // DEBUG: Vê na consola se o DICO do mapa existe no IPMA
                        console.log(`Concelho: ${f.properties.Concelho} | DICO Mapa: ${d} | Encontrado no IPMA:`, !!item);

                        if (item && item.data) {
                            const met = item.data;
                            const tMax = met.tMax; 
                            const hrMin = met.hrMin;
                            const vento = met.ff_dir_id;
                            const rcm = met.rcm;

                            const classeTemp = (parseFloat(tMax) > 30) ? "temp-alerta" : "";

                            l.bindPopup(`
                                <b>${f.properties.Concelho}</b><br>
                                <b style="color:${coresRisco[rcm]}">Risco ${nomesRisco[rcm]}</b>
                                <table class="tab-meteo">
                                    <tr><td>🌡️ T. Máxima</td><td class="${classeTemp}">${tMax}ºC</td></tr>
                                    <tr><td>💧 H. Mínima</td><td>${hrMin}%</td></tr>
                                    <tr><td>💨 Vento (Dir)</td><td>${vento}</td></tr>
                                </table>
                            `);
                        } else {
                            l.bindPopup(`<b>${f.properties.Concelho}</b><br><small style="color:red">DICO ${d} sem dados no IPMA</small>`);
                        }
                    }
                }).addTo(map);
            } catch (err) { console.error("Erro na ligação:", err); }
        }

        mudarDia(0);
    </script>
</body>
</html>
