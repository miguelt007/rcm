<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco e Meteorologia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; }
        
        #topbar { 
            background: #1a1a1a; padding: 15px; text-align: center; 
            border-bottom: 2px solid #ff4400; height: 75px; flex-shrink: 0; 
            z-index: 2000; position: relative;
        }
        #titulo-principal { font-family: 'Segoe UI', Arial, sans-serif; font-size: 19px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        
        .controles {
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px;
            display: flex; gap: 8px; border: 1px solid #444;
        }
        .btn-dia { 
            background: #333; color: white; border: 1px solid #555; padding: 8px 12px; 
            cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold;
        }
        .btn-dia.active { background: #ff4400; border-color: #fff; }

        /* Estilo da Tabela no Popup */
        .leaflet-popup-content { text-align: center; color: #333; min-width: 190px; font-family: 'Segoe UI', Arial, sans-serif; }
        .popup-img { width: 75px; height: auto; margin: 5px auto; display: block; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; border: 1px solid #eee; }
        .tab-meteo td { border: 1px solid #ddd; padding: 5px; text-align: left; }
        .tab-meteo td:first-child { background: #f8f8f8; font-weight: bold; width: 45%; }
        
        .legend { background: rgba(255, 255, 255, 0.95); padding: 10px; color: #111; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div id="topbar">
    <p id="titulo-principal">Risco de Incêndio e Meteorologia (IPMA)</p>
</div>

<div id="mapIPMA"></div>

<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const limitesPT = [[36.8,-10.5], [42.3,-6]];
const map = L.map('mapIPMA').setView([39.5, -8], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRiscoIPMA = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

// Dicionário para ligar Distrito (primeiros 2 dígitos do DICO) ao ID da Capital no IPMA
const distritosParaID = {
    "01": "1010500", // Aveiro
    "02": "1020500", // Beja
    "03": "1030300", // Braga
    "04": "1040200", // Bragança
    "05": "1050200", // Castelo Branco
    "06": "1060300", // Coimbra
    "07": "1070500", // Évora
    "08": "1080500", // Faro
    "09": "1090700", // Guarda
    "10": "1100900", // Leiria
    "11": "1110600", // Lisboa
    "12": "1121400", // Portalegre
    "13": "1131200", // Porto
    "14": "1141600", // Santarém
    "15": "1151200", // Setúbal
    "16": "1160900", // Viana do Castelo
    "17": "1171400", // Vila Real
    "18": "1182300"  // Viseu
};

let camadaGeoJSON;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    try {
        const proxy = "https://api.allorigins.win/get?url=";
        const urlRisco = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`);
        const urlMeteo = encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/cities/daily/hp-daily-forecast-day${dia}.json`);

        const [resRisco, resMeteo, geo] = await Promise.all([
            fetch(proxy + urlRisco).then(r => r.json()).then(d => JSON.parse(d.contents)),
            fetch(proxy + urlMeteo).then(r => r.json()).then(d => JSON.parse(d.contents)),
            fetch("concelhos-simples.geojson").then(r => r.json())
        ]);

        const riscoPorDico = {};
        Object.values(resRisco.local).forEach(c => { riscoPorDico[c.dico] = c.data.rcm; });

        const meteoMap = {};
        resMeteo.data.forEach(m => { meteoMap[m.globalIdLocal] = m; });

        camadaGeoJSON = L.geoJSON(geo, {
            style: (f) => ({ 
                fillColor: riscoPorDico[f.properties.DICO] ? infoRiscoIPMA[riscoPorDico[f.properties.DICO]].cor : "transparent", 
                weight: 1, color: "#444", fillOpacity: 0.6 
            }),
            onEachFeature: (f, l) => {
                const dico = f.properties.DICO;
                const r = riscoPorDico[dico];
                
                // Pega nos primeiros 2 dígitos do DICO para saber o distrito
                const distId = dico.substring(0, 2);
                const globalId = distritosParaID[distId];
                const m = meteoMap[globalId];

                if(r) {
                    const info = infoRiscoIPMA[r];
                    let popupHtml = `
                        <b style="font-size:15px; display:block;">${f.properties.Concelho}</b>
                        <img src="images/${info.img}" class="popup-img">
                        <b style="color:#d35400">Risco: ${info.nome}</b>
                    `;

                    if(m) {
                        popupHtml += `
                        <table class="tab-meteo">
                            <tr><td>🌡️ Temp.</td><td>${m.tMin}º / ${m.tMax}ºC</td></tr>
                            <tr><td>💨 Vento</td><td>${m.ffWind} km/h</td></tr>
                            <tr><td>💧 Humidade</td><td>${m.precipitaProb}%</td></tr>
                            <tr><td>🌧️ Precip.</td><td>${m.precipitaProb}% prob.</td></tr>
                        </table>
                        <div style="font-size:9px; color:#777; margin-top:4px;">*Dados Ref: Capital de Distrito</div>`;
                    }

                    l.bindPopup(popupHtml);
                }
            }
        }).addTo(map);

    } catch(e) { console.error("Erro na integração de dados"); }
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRiscoIPMA) div.innerHTML += `<i style="background:${infoRiscoIPMA[i].cor}"></i> ${infoRiscoIPMA[i].nome}<br>`;
    return div;
};
legenda.addTo(map);

mudarDia(0);
</script>
</body>
</html>
