<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IPMA - Risco e Meteorologia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #333; height: 85px; box-sizing: border-box; }
        #titulo-principal { font-size: 18px; font-weight: bold; color: #ff4400; margin: 0; text-transform: uppercase; }
        #mapIPMA { width: 100vw; height: calc(100vh - 85px); background: #050505; }
        
        .controles {
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.9); padding: 10px; border-radius: 8px;
            display: flex; gap: 8px; border: 1px solid #444;
        }
        .btn-dia { 
            background: #333; color: white; border: 1px solid #555; padding: 8px 12px; 
            cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold;
        }
        .btn-dia.active { background: #ff4400; border-color: #fff; }

        .legend { background: rgba(255, 255, 255, 0.9); padding: 10px; color: #111; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .legend i { width: 16px; height: 16px; float: left; margin-right: 8px; border-radius: 2px; }

        .leaflet-popup-content { text-align: center; color: #333; line-height: 1.5; min-width: 160px; }
        .popup-img { width: 85px; height: auto; margin: 10px auto; display: block; }
        .meteo-box { border-top: 1px solid #ddd; margin-top: 8px; padding-top: 8px; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div id="topbar">
    <p id="titulo-principal">Risco de Incêndio e Meteorologia (IPMA)</p>
</div>

<div id="mapIPMA"></div>

<div class="controles">
    <button class="btn-dia active" onclick="mudarDia(0, this)">HOJE</button>
    <button class="btn-dia" onclick="mudarDia(1, this)">AMANHÃ</button>
    <button class="btn-dia" onclick="mudarDia(2, this)">P. AMANHÃ</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const limitesPT = [[36.8,-10.5], [42.3,-6]];
const map = L.map('mapIPMA').fitBounds(limitesPT);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const infoRiscoIPMA = {
    1: { nome: "Reduzido", cor: "#00cc00", img: "Reduzido-2022.svg" },
    2: { nome: "Moderado", cor: "#ffff00", img: "Moderado-2022.svg" },
    3: { nome: "Elevado", cor: "#ff9900", img: "Elevado-2022.svg" },
    4: { nome: "Muito Elevado", cor: "#ff3300", img: "MuitoElevado-2022.svg" },
    5: { nome: "Máximo", cor: "#990000", img: "Maximo-2022.svg" }
};

let camadaGeoJSON;

async function mudarDia(dia, btn) {
    if(btn) {
        document.querySelectorAll('.btn-dia').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    if (camadaGeoJSON) map.removeLayer(camadaGeoJSON);

    try {
        const proxy = "https://api.allorigins.win/get?url=";
        
        // Pedido 1: Risco de Incêndio (por DICO)
        const resRisco = await fetch(proxy + encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json`)).then(r => r.json());
        const dadosRisco = JSON.parse(resRisco.contents);

        // Pedido 2: Meteorologia (Cidades/Concelhos)
        const resMeteo = await fetch(proxy + encodeURIComponent(`https://api.ipma.pt/open-data/forecast/meteorology/cities/daily/hp-daily-forecast-day${dia}.json`)).then(r => r.json());
        const dadosMeteo = JSON.parse(resMeteo.contents);

        // Pedido 3: Local GeoJSON
        const geo = await fetch("concelhos-simples.geojson").then(r => r.json());

        // Mapear Risco
        const riscoMap = {};
        Object.values(dadosRisco.local).forEach(c => { riscoMap[c.dico] = c.data.rcm; });

        // Mapear Meteorologia pelo nome (Normalizado para MAIÚSCULAS)
        const meteoMap = {};
        dadosMeteo.data.forEach(m => {
            // O IPMA envia GlobalID, mas como o teu GeoJSON não tem, tentamos associar pelo nome se necessário
            // Nota: Para precisão total, o ideal seria o GlobalID, mas vamos usar o que temos
            meteoMap[m.globalIdLocal] = m; 
        });

        camadaGeoJSON = L.geoJSON(geo, {
            style: (f) => ({ 
                fillColor: riscoMap[f.properties.DICO] ? infoRiscoIPMA[riscoMap[f.properties.DICO]].cor : "transparent", 
                weight: 1, color: "#444", fillOpacity: 0.6 
            }),
            onEachFeature: (f, l) => {
                const r = riscoMap[f.properties.DICO];
                // Tentativa de link pela GlobalID se existir no GeoJSON, senão fica vazio por agora
                // Se o teu ficheiro tiver campo GLOBALID, ele vai ler aqui:
                const m = meteoMap[f.properties.GLOBALID]; 

                if(r) {
                    const info = infoRiscoIPMA[r];
                    let popupHtml = `
                        <div style="padding:5px;">
                            <b style="font-size:15px; display:block;">${f.properties.Concelho}</b>
                            <img src="images/${info.img}" class="popup-img">
                            <b>Risco: ${info.nome}</b>
                    `;

                    if(m) {
                        popupHtml += `
                            <div class="meteo-box">
                                🌡️ <b>Máx:</b> ${m.tMax}ºC | <b>Mín:</b> ${m.tMin}ºC<br>
                                💧 <b>Chuva:</b> ${m.precipitaProb}%
                            </div>
                        `;
                    }
                    
                    popupHtml += `</div>`;
                    l.bindPopup(popupHtml);
                }
            }
        }).addTo(map);
    } catch(e) { console.error(e); }
}

const legenda = L.control({position: 'bottomright'});
legenda.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<b>Risco IPMA</b><br>';
    for (let i in infoRiscoIPMA) div.innerHTML += `<i style="background:${infoRiscoIPMA[i].cor}"></i> ${infoRiscoIPMA[i].nome}<br>`;
    return div;
};
legenda.addTo(map);

mudarDia(0);
</script>
</body>
</html>
