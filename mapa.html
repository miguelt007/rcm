<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>IPMA - Risco, Temperatura e Humidade</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
        #topbar { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 3px solid #ff4400; color: #ff4400; font-weight: bold; text-transform: uppercase; }
        #mapIPMA { flex-grow: 1; width: 100%; background: #050505; }
        .controles { position: absolute; top: 90px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .btn-dia { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-dia.active { background: #ff4400; border-color: #fff; }
        .leaflet-popup-content { text-align: center; color: #333; min-width: 220px; }
        .tab-meteo { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .tab-meteo td { border: 1px solid #eee; padding: 5px; text-align: left; }
        .tab-meteo td:first-child { background: #f9f9f9; font-weight: bold; color: #555; width: 50%; }
    </style>
</head>
<body>

<div id="topbar">Risco de Incêndio e Humidade Relativa - IPMA</div>

<div class="controles">
    <button id="b0" class="btn-dia active" onclick="carregar(0)">HOJE</button>
    <button id="b1" class="btn-dia" onclick="carregar(1)">AMANHÃ</button>
</div>

<div id="mapIPMA"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('mapIPMA').setView([39.5, -8.3], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const cores = { 1: "#00cc00", 2: "#ffff00", 3: "#ff9900", 4: "#ff3300", 5: "#990000" };
    const nomes = { 1: "Reduzido", 2: "Moderado", 3: "Elevado", 4: "Muito Elevado", 5: "Máximo" };

    let camada;
    let geojsonCache = null;

    async function carregar(dia) {
        document.getElementById('b0').className = dia === 0 ? 'btn-dia active' : 'btn-dia';
        document.getElementById('b1').className = dia === 1 ? 'btn-dia active' : 'btn-dia';
        
        if (camada) map.removeLayer(camada);

        const proxy = "https://corsproxy.io/?";
        // Este URL é o que contém a humidade por concelho (hrMin e hrMax)
        const urlIPMA = `https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d${dia}.json?v=${Date.now()}`;

        try {
            if (!geojsonCache) {
                geojsonCache = await fetch("concelhos-simples.geojson").then(r => r.json());
            }

            const res = await fetch(proxy + encodeURIComponent(urlIPMA)).then(r => r.json());
            const dadosMap = res.local || (res.rcmF && res.rcmF[0].local);

            camada = L.geoJSON(geojsonCache, {
                style: (f) => {
                    const d = String(f.properties.DICO);
                    const item = dadosMap[d];
                    const rcmVal = (item && item.data) ? item.data.rcm : (item ? item.rcm : null);
                    return { fillColor: rcmVal ? cores[rcmVal] : "#333", weight: 1, color: "#444", fillOpacity: 0.7 };
                },
                onEachFeature: (f, l) => {
                    const d = String(f.properties.DICO);
                    const item = dadosMap[d];

                    if (item && item.data) {
                        const m = item.data;
                        l.bindPopup(`
                            <b>${f.properties.Concelho}</b><br>
                            <b style="color:${cores[m.rcm]}">Risco ${nomes[m.rcm]}</b>
                            <table class="tab-meteo">
                                <tr><td>🌡️ Temp Máx</td><td><b>${m.tMax || "--"}ºC</b></td></tr>
                                <tr><td>💧 Humidade Mín</td><td><b>${m.hrMin || "--"}%</b></td></tr>
                                <tr><td>💧 Humidade Máx</td><td><b>${m.hrMax || "--"}%</b></td></tr>
                                <tr><td>💨 Vento (Dir)</td><td><b>${m.ff_dir_id || "--"}</b></td></tr>
                            </table>
                        `);
                    } else {
                        l.bindPopup(`<b>${f.properties.Concelho}</b><br>Dados locais não disponíveis.`);
                    }
                }
            }).addTo(map);
        } catch (e) { console.error(e); }
    }

    carregar(0);
</script>
</body>
</html>
