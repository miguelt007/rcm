<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Risco</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    #filtroConcelho {
      padding: 8px;
      font-size: 16px;
      width: 300px;
      margin-bottom: 12px;
    }
    .concelho {
      margin: 4px 0;
    }
  </style>
</head>
<body>

  <h2>Filtrar por concelho</h2>
  <input type="text" id="filtroConcelho" placeholder="Escreve o nome do concelho..." oninput="filtrarPorNome()" />

  <div id="listaConcelhos">
    <div class="concelho">Lisboa</div>
    <div class="concelho">Loures</div>
    <div class="concelho">Torres Vedras</div>
    <div class="concelho">Sobral de Monte Agraço</div>
    <div class="concelho">Vila Franca de Xira</div>
    <div class="concelho">Odivelas</div>
    <div class="concelho">Amadora</div>
    <div class="concelho">Sintra</div>
    <div class="concelho">Cascais</div>
    <div class="concelho">Oeiras</div>
    <!-- Podes adicionar os restantes aqui -->
  </div>

  <script>
    function filtrarPorNome() {
      const termo = document.getElementById("filtroConcelho").value.toLowerCase();
      const concelhos = document.querySelectorAll(".concelho");

      concelhos.forEach(el => {
        const nome = el.textContent.toLowerCase();
        el.style.display = nome.includes(termo) ? "block" : "none";
      });
    }
  </script>

</body>
</html>
