<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Risco de Incêndio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 90vh; }
    body { font-family: sans-serif; margin: 0; }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Risco de Incêndio</h2>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([39.5, -8], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const urls = {
      hoje: 'https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json',
      amanha: 'https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d1.json',
      locais: 'https://api.ipma.pt/open-data/distrits-islands.json'
    };

    Promise.all([
      fetch(urls.hoje).then(res => res.json()),
      fetch(urls.amanha).then(res => res.json()),
      fetch(urls.locais).then(res => res.json())
    ])
    .then(([hoje, amanha, locais]) => {
      const locaisMap = {};
      locais.data.forEach(loc => {
        locaisMap[loc.globalIdLocal] = loc;
      });

      hoje.data.forEach(entry => {
        const meta = locaisMap[entry.globalIdLocal];
        if (!meta || !meta.latitude || !meta.longitude) return;

        const amanhaEntry = amanha.data.find(e => e.globalIdLocal === entry.globalIdLocal);
        const popup = `
          <strong>${meta.local}</strong><br>
          Hoje: ${entry.rcm} (${entry.tMin}°C - ${entry.tMax}°C)<br>
          Amanhã: ${amanhaEntry?.rcm ?? '—'} (${amanhaEntry?.tMin ?? '—'}°C - ${amanhaEntry?.tMax ?? '—'}°C)
        `;
        L.circleMarker([meta.latitude, meta.longitude], {
          radius: 6,
          color: 'red',
          fillColor: 'orange',
          fillOpacity: 0.6
        }).addTo(map).bindPopup(popup);
      });
    });
  </script>
</body>
</html>
