<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Risco de Incêndio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: sans-serif; padding: 1em; }
    h2 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { padding: 0.5em; border: 1px solid #ccc; text-align: center; }
    tr:nth-child(even) { background: #f9f9f9; }
    .cor { font-weight: bold; color: #fff; }
    .rcm-1 { background: #ffffb2; color: #000; }
    .rcm-2 { background: #fecc5c; color: #000; }
    .rcm-3 { background: #fd8d3c; }
    .rcm-4 { background: #f03b20; }
    .rcm-5 { background: #bd0026; }
    .legenda { margin-top: 2em; }
    .legenda-item { display: flex; align-items: center; margin-bottom: 0.5em; }
    .legenda-box {
      width: 20px; height: 20px; margin-right: 0.5em; border: 1px solid #ccc;
    }
    .rcm-1 .legenda-box { background: #ffffb2; }
    .rcm-2 .legenda-box { background: #fecc5c; }
    .rcm-3 .legenda-box { background: #fd8d3c; }
    .rcm-4 .legenda-box { background: #f03b20; }
    .rcm-5 .legenda-box { background: #bd0026; }
  </style>
</head>
<body>
  <h2>Risco de Incêndio</h2>
  <table>
    <thead>
      <tr>
        <th>DICO</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th colspan="2">rcm</th>
      </tr>
      <tr>
        <th></th><th></th><th></th><th>Hoje</th><th>Amanhã</th>
      </tr>
    </thead>
    <tbody id="tabela">
      <tr><td colspan="5">A carregar dados...</td></tr>
    </tbody>
  </table>

  <div class="legenda">
    <h3>Legenda de Risco</h3>
    <div class="legenda-item rcm-1"><div class="legenda-box"></div>Baixo</div>
    <div class="legenda-item rcm-2"><div class="legenda-box"></div>Moderado</div>
    <div class="legenda-item rcm-3"><div class="legenda-box"></div>Elevado</div>
    <div class="legenda-item rcm-4"><div class="legenda-box"></div>Muito Elevado</div>
    <div class="legenda-item rcm-5"><div class="legenda-box"></div>Máximo</div>
  </div>

  <script>
    const nomes = {
      1: 'Baixo',
      2: 'Moderado',
      3: 'Elevado',
      4: 'Muito Elevado',
      5: 'Máximo'
    };

    Promise.all([
      fetch('https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json').then(r => r.json()),
      fetch('https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d1.json').then(r => r.json())
    ])
    .then(([hoje, amanha]) => {
      const tbody = document.getElementById('tabela');
      tbody.innerHTML = '';

      const locaisHoje = hoje.local;
      const locaisAmanha = amanha.local;

      for (const id in locaisHoje) {
        const h = locaisHoje[id];
        const a = locaisAmanha[id];
        if (!h || !a) continue;

        const rcmHoje = h.data.rcm;
        const rcmAmanha = a.data.rcm;

        const nomeHoje = nomes[rcmHoje] || '—';
        const nomeAmanha = nomes[rcmAmanha] || '—';

        const linha = document.createElement('tr');
        linha.innerHTML = `
          <td>${id}</td>
          <td>${h.latitude}</td>
          <td>${h.longitude}</td>
          <td class="cor rcm-${rcmHoje}">${nomeHoje}</td>
          <td class="cor rcm-${rcmAmanha}">${nomeAmanha}</td>
        `;
        tbody.appendChild(linha);
      }
    })
    .catch(error => {
      const tbody = document.getElementById('tabela');
      tbody.innerHTML = `<tr><td colspan="5">Erro ao carregar dados: ${error.message}</td></tr>`;
    });
  </script>
</body>
</html>
