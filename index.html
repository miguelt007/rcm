<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Risco de Incêndio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: sans-serif; padding: 1em; }
    h2 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { padding: 0.5em; border: 1px solid #ccc; text-align: left; }
    tr:nth-child(even) { background: #f9f9f9; }
  </style>
</head>
<body>
  <h2>Risco de Incêndio</h2>
  <table>
    <thead>
      <tr>
        <th>Código DICO</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Risco (rcm)</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <script>
    fetch('https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json')
      .then(res => res.json())
      .then(json => {
        const tbody = document.getElementById('tabela');
        json.data.forEach(({ DICO, latitude, longitude, rcm }) => {
          const linha = document.createElement('tr');
          linha.innerHTML = `
            <td>${DICO}</td>
            <td>${latitude}</td>
            <td>${longitude}</td>
            <td>${rcm}</td>
          `;
          tbody.appendChild(linha);
        });
      });
  </script>
</body>
</html>
