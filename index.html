<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Risco de Incêndio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 95vh; }
    body { margin: 0; font-family: sans-serif; }
    h2 { text-align: center; margin: 0.5em 0; }
  </style>
</head>
<body>
  <h2>Risco de Incêndio</h2>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([39.5, -8], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Função para cor conforme risco
    function getColor(rcm) {
      return {
        1: '#ffffb2', // Baixo
        2: '#fecc5c', // Moderado
        3: '#fd8d3c', // Elevado
        4: '#f03b20', // Muito Elevado
        5: '#bd0026'  // Máximo
      }[rcm] || '#ccc'; // Sem dados
    }

    // Carregar GeoJSON simplificado dos concelhos
    fetch('https://raw.githubusercontent.com/dgterritorio/caop/main/caop2023-simplificado.json')
      .then(res => res.json())
      .then(caop => {
        // Carregar risco IPMA
        fetch('https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json')
          .then(res => res.json())
          .then(risco => {
            const riscoMap = {};
            risco.data.forEach(r => riscoMap[r.idConcelho] = r.rcm);

            // Pintar concelhos
            L.geoJSON(caop, {
              style: feature => {
                const rcm = riscoMap[feature.properties.DICOFRE];
                return {
                  fillColor: getColor(rcm),
                  weight: 1,
                  color: '#666',
                  fillOpacity: 0.7
                };
              },
              onEachFeature: (feature, layer) => {
                const nome = feature.properties.NOME;
                const rcm = riscoMap[feature.properties.DICOFRE];
                const legenda = ['Baixo','Moderado','Elevado','Muito Elevado','Máximo'][rcm - 1] || 'Sem dados';
                layer.bindPopup(`<strong>${nome}</strong><br>Risco: ${legenda} (${rcm ?? '—'})`);
              }
            }).addTo(map);
          });
      });
  </script>
</body>
</html>
