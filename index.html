<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Risco</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    #filtroConcelho {
      padding: 8px;
      font-size: 16px;
      width: 300px;
      margin-bottom: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 6px 0;
    }
  </style>
</head>
<body>

  <h2>Filtrar por concelho</h2>
  <input type="text" id="filtroConcelho" placeholder="Escreve o nome do concelho..." oninput="filtrarPorNome()" />

  <ul id="listaConcelhos">
    <li>Lisboa</li>
    <li>Loures</li>
    <li>Torres Vedras</li>
    <li>Sobral de Monte Agraço</li>
    <li>Vila Franca de Xira</li>
    <li>Odivelas</li>
    <li>Amadora</li>
    <li>Sintra</li>
    <li>Cascais</li>
    <li>Oeiras</li>
    <!-- Adiciona os restantes -->
  </ul>

  <script>
    function filtrarPorNome() {
      const termo = document.getElementById("filtroConcelho").value.toLowerCase();
      const itens = document.querySelectorAll("#listaConcelhos li");

      itens.forEach(item => {
        const nome = item.textContent.toLowerCase();
        item.style.display = nome.includes(termo) ? "" : "none";
      });
    }
  </script>

</body>
</html>
