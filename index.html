<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Risco de Incêndio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 95vh; }
    body { margin: 0; font-family: sans-serif; }
    h2 { text-align: center; margin: 0.5em 0; }
  </style>
</head>
<body>
  <h2>Risco de Incêndio</h2>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([39.5, -8], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    function getColor(rcm) {
      return {
        1: '#ffffb2',
        2: '#fecc5c',
        3: '#fd8d3c',
        4: '#f03b20',
        5: '#bd0026'
      }[rcm] || '#ccc';
    }

    fetch('https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d0.json')
      .then(res => res.json())
      .then(data => {
        data.data.forEach(entry => {
          const { DICO, rcm, latitude, longitude } = entry;
          if (!latitude || !longitude) return;

          const legenda = ['Baixo','Moderado','Elevado','Muito Elevado','Máximo'][rcm - 1] || 'Sem dados';
          const popup = `<strong>Concelho ${DICO}</strong><br>Risco: ${legenda} (${rcm})`;

          L.circleMarker([latitude, longitude], {
            radius: 6,
            color: getColor(rcm),
            fillColor: getColor(rcm),
            fillOpacity: 0.7
          }).addTo(map).bindPopup(popup);
        });
      });
  </script>
</body>
</html>
