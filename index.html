<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Risco</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    input, select {
      padding: 8px;
      font-size: 16px;
      margin-right: 10px;
      margin-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    tr.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <h2>Dashboard de Risco</h2>

  <!-- Filtro por risco -->
  <select id="filtroRisco" onchange="filtrarTabela()">
    <option value="">Todos os riscos</option>
    <option value="Muito Elevado">Muito Elevado</option>
    <option value="Elevado">Elevado</option>
    <option value="Moderado">Moderado</option>
    <option value="Reduzido">Reduzido</option>
  </select>

  <!-- Filtro por nome de concelho -->
  <input type="text" id="filtroConcelho" placeholder="Filtrar por concelho..." oninput="filtrarTabela()" />

  <!-- Tabela de concelhos -->
  <table id="tabelaRisco">
    <thead>
      <tr>
        <th>Concelho</th>
        <th>Risco</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>Lisboa</td><td>Moderado</td></tr>
      <tr><td>Loures</td><td>Elevado</td></tr>
      <tr><td>Torres Vedras</td><td>Muito Elevado</td></tr>
      <tr><td>Sobral de Monte Agraço</td><td>Reduzido</td></tr>
      <tr><td>Vila Franca de Xira</td><td>Elevado</td></tr>
    </tbody>
  </table>

  <script>
    function filtrarTabela() {
      const risco = document.getElementById("filtroRisco").value.toLowerCase();
      const concelho = document.getElementById("filtroConcelho").value.toLowerCase();
      const linhas = document.querySelectorAll("#tabelaRisco tbody tr");

      linhas.forEach(linha => {
        const nome = linha.cells[0].textContent.toLowerCase();
        const nivel = linha.cells[1].textContent.toLowerCase();

        const mostra = (!risco || nivel === risco) && nome.includes(concelho);
        linha.classList.toggle("hidden", !mostra);
      });
    }
  </script>

</body>
</html>
